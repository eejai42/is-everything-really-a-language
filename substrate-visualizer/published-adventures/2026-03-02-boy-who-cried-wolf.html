<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Boy Who Cried Wolf</title>
  <style>

:root {
  --bg: #0d1117;
  --panel: #161b22;
  --panel2: #21262d;
  --stroke: #30363d;
  --text: #e6edf3;
  --muted: #8b949e;
  --accent: #7c3aed;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

#adventure-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  width: 100%;
  height: 100vh;
  position: relative;
}

#adventure-stage {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100%;
  height: 100%;
}

/* Gear button - top right corner */
#settings-btn {
  position: fixed;
  top: 16px;
  right: 16px;
  width: 44px;
  height: 44px;
  border: 1px solid var(--stroke);
  border-radius: 50%;
  background: var(--panel);
  color: var(--text);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  opacity: 0.6;
  transition: opacity 0.2s, transform 0.2s;
}

#settings-btn:hover {
  opacity: 1;
  transform: scale(1.1);
}

/* Settings popup */
#settings-popup {
  position: fixed;
  top: 70px;
  right: 16px;
  background: var(--panel);
  border: 1px solid var(--stroke);
  border-radius: 12px;
  padding: 16px;
  z-index: 999;
  min-width: 200px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  display: none;
}

#settings-popup.show {
  display: block;
}

.settings-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 12px;
  color: var(--muted);
}

.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.settings-row label {
  font-size: 13px;
  color: var(--text);
}

.settings-row select {
  background: var(--panel2);
  border: 1px solid var(--stroke);
  border-radius: 6px;
  color: var(--text);
  padding: 6px 12px;
  font-size: 13px;
  cursor: pointer;
}

.settings-row button {
  background: var(--panel2);
  border: 1px solid var(--stroke);
  border-radius: 6px;
  color: var(--text);
  padding: 8px 16px;
  font-size: 13px;
  cursor: pointer;
  width: 100%;
}

.settings-row button:hover {
  background: var(--stroke);
}

#step-counter {
  font-size: 12px;
  color: var(--muted);
  text-align: center;
}

.lessons-list {
  text-align: left;
  margin: 16px 0;
  padding-left: 24px;
}

.lessons-list li {
  margin: 8px 0;
  color: var(--muted);
}

#choice-overlay, #end-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.85);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 100;
}

.choice-content, .end-content {
  background: var(--panel);
  border: 1px solid var(--stroke);
  border-radius: 16px;
  padding: 32px;
  max-width: 600px;
  width: 90%;
  text-align: center;
}

#choice-prompt {
  font-size: 24px;
  font-weight: 600;
  margin-bottom: 24px;
}

#choice-options {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.choice-option-btn {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  padding: 16px 20px;
  background: var(--panel2);
  border: 2px solid var(--stroke);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.15s ease;
  text-align: left;
  color: var(--text);
}

.choice-option-btn:hover {
  border-color: var(--accent);
  background: rgba(124, 58, 237, 0.1);
}

.choice-icon {
  font-size: 24px;
  margin-bottom: 4px;
}

.choice-label {
  font-size: 16px;
  font-weight: 600;
}

.choice-desc {
  font-size: 13px;
  color: var(--muted);
  margin-top: 4px;
}

.end-content h2 {
  font-size: 28px;
  margin-bottom: 16px;
  color: var(--accent);
}

.end-content p {
  font-size: 16px;
  color: var(--muted);
  margin-bottom: 24px;
  line-height: 1.5;
  white-space: pre-wrap;
}

#lessons-list {
  font-size: 14px;
  line-height: 1.6;
}

#lessons-list li {
  margin-bottom: 8px;
}

.end-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
}

.action-btn {
  padding: 12px 24px;
  border: 1px solid var(--stroke);
  border-radius: 8px;
  background: var(--panel2);
  color: var(--text);
  font-size: 14px;
  cursor: pointer;
  transition: all 0.15s ease;
}

.action-btn:hover {
  border-color: var(--accent);
}

.action-btn.primary {
  background: var(--accent);
  border-color: var(--accent);
}

.action-btn.primary:hover {
  background: #6d28d9;
}


  </style>
</head>
<body>
  <div id="adventure-container">
    <main id="adventure-stage"></main>

    <!-- Settings gear button -->
    <button id="settings-btn" title="Settings">⚙️</button>

    <!-- Settings popup -->
    <div id="settings-popup">
      <div class="settings-title">The Boy Who Cried Wolf</div>
      
      <div class="settings-row">
        <label>Speed</label>
        <select id="speed-select">
          <option value="0.5">0.5x</option>
          <option value="1" selected>1x</option>
          <option value="2">2x</option>
          <option value="4">4x</option>
        </select>
      </div>
      <div class="settings-row">
        <button id="btn-pause">⏸ Pause</button>
      </div>
      
      <div class="settings-row">
        <button id="btn-restart-settings">🔄 Restart</button>
      </div>
      <div id="step-counter">Step 1</div>
    </div>

    <div id="choice-overlay" style="display: none;">
      <div class="choice-content">
        <div id="choice-prompt">What would you like to do?</div>
        <div id="choice-options"></div>
      </div>
    </div>

    <div id="end-overlay" style="display: none;">
      <div class="end-content">
        <h2 id="end-title">Adventure Complete</h2>
        <p id="end-summary">Thanks for exploring!</p>
        <ul id="lessons-list" class="lessons-list" style="display: none;"></ul>
        <div class="end-actions">
          <button id="btn-restart" class="action-btn primary">Restart</button>
        </div>
      </div>
    </div>
  </div>

        "svgContent": "<svg viewBox=\"0 0 960 540\" xmlns=\"http://www.w3.org/2000/svg\">\n  <defs>\n    <linearGradient id=\"sky\" x1=\"0%\" y1=\"0%\" x2=\"0%\" y2=\"100%\">\n      <stop offset=\"0%\" stop-color=\"#87CEEB\"/>\n      <stop offset=\"100%\" stop-color=\"#E0F4FF\"/>\n    </linearGradient>\n    <linearGradient id=\"hill\" x1=\"0%\" y1=\"0%\" x2=\"0%\" y2=\"100%\">\n      <stop offset=\"0%\" stop-color=\"#7CCD7C\"/>\n      <stop offset=\"100%\" stop-color=\"#228B22\"/>\n    </linearGradient>\n    <linearGradient id=\"skin\" x1=\"0%\" y1=\"0%\" x2=\"0%\" y2=\"100%\">\n      <stop offset=\"0%\" stop-color=\"#FFDAB9\"/>\n      <stop offset=\"100%\" stop-color=\"#E8B896\"/>\n    </linearGradient>\n\n    <style>\n      /* Boy crying wolf animations */\n      @keyframes armWave {\n        0%, 100% { transform: rotate(-20deg); }\n        50% { transform: rotate(20deg); }\n      }\n      @keyframes jumpUp {\n        0%, 100% { transform: translateY(0); }\n        50% { transform: translateY(-15px); }\n      }\n      @keyframes mouthShout {\n        0%, 100% { transform: scaleY(1); }\n        25%, 75% { transform: scaleY(1.5); }\n      }\n\n      /* Villagers running */\n      @keyframes runLeft {\n        0% { transform: translateX(200px); }\n        100% { transform: translateX(0); }\n      }\n      @keyframes runRight {\n        0% { transform: translateX(-200px); }\n        100% { transform: translateX(0); }\n      }\n      @keyframes legRun {\n        0%, 100% { transform: rotate(-25deg); }\n        50% { transform: rotate(25deg); }\n      }\n      @keyframes armRun {\n        0%, 100% { transform: rotate(30deg); }\n        50% { transform: rotate(-30deg); }\n      }\n      @keyframes bounce {\n        0%, 100% { transform: translateY(0); }\n        50% { transform: translateY(-8px); }\n      }\n\n      /* Scared sheep */\n      @keyframes sheepScatter {\n        0%, 100% { transform: translateX(0) rotate(0deg); }\n        25% { transform: translateX(-10px) rotate(-5deg); }\n        75% { transform: translateX(10px) rotate(5deg); }\n      }\n\n      .boy-shouting { animation: jumpUp 0.5s ease-in-out infinite; }\n      .boy-arm-left { animation: armWave 0.4s ease-in-out infinite; transform-origin: top center; }\n      .boy-arm-right { animation: armWave 0.4s ease-in-out infinite 0.2s; transform-origin: top center; }\n      .boy-mouth { animation: mouthShout 0.3s ease-in-out infinite; transform-origin: center; }\n\n      .villager-1 { animation: runRight 3s ease-out forwards, bounce 0.3s ease-in-out infinite; }\n      .villager-2 { animation: runLeft 3.5s ease-out forwards, bounce 0.35s ease-in-out infinite 0.1s; }\n      .villager-leg { animation: legRun 0.25s ease-in-out infinite; transform-origin: top center; }\n      .villager-arm { animation: armRun 0.25s ease-in-out infinite; transform-origin: top center; }\n\n      .sheep-scared { animation: sheepScatter 0.5s ease-in-out infinite; }\n    </style>\n  </defs>\n\n  <!-- Sky -->\n  <rect width=\"960\" height=\"540\" fill=\"url(#sky)\"/>\n\n  <!-- Sun -->\n  <circle cx=\"820\" cy=\"80\" r=\"50\" fill=\"#FFD700\" opacity=\"0.9\"/>\n\n  <!-- Distant hills -->\n  <ellipse cx=\"200\" cy=\"350\" rx=\"300\" ry=\"120\" fill=\"#6B8E6B\"/>\n  <ellipse cx=\"700\" cy=\"360\" rx=\"350\" ry=\"100\" fill=\"#5F9F5F\"/>\n\n  <!-- Main hillside -->\n  <ellipse cx=\"480\" cy=\"600\" rx=\"600\" ry=\"280\" fill=\"url(#hill)\"/>\n\n  <!-- Scared sheep running around -->\n  <g class=\"sheep-scared\" transform=\"translate(650, 420)\">\n    <ellipse cx=\"0\" cy=\"0\" rx=\"35\" ry=\"24\" fill=\"#FFF\"/>\n    <ellipse cx=\"32\" cy=\"3\" rx=\"15\" ry=\"11\" fill=\"#333\"/>\n    <circle cx=\"38\" cy=\"0\" r=\"3\" fill=\"white\"/>\n    <rect x=\"-18\" y=\"15\" width=\"7\" height=\"20\" rx=\"2\" fill=\"#333\"/>\n    <rect x=\"-5\" y=\"15\" width=\"7\" height=\"20\" rx=\"2\" fill=\"#333\"/>\n    <rect x=\"8\" y=\"15\" width=\"7\" height=\"20\" rx=\"2\" fill=\"#333\"/>\n    <rect x=\"18\" y=\"15\" width=\"7\" height=\"20\" rx=\"2\" fill=\"#333\"/>\n  </g>\n\n  <g class=\"sheep-scared\" style=\"animation-delay: 0.2s;\" transform=\"translate(750, 400)\">\n    <ellipse cx=\"0\" cy=\"0\" rx=\"30\" ry=\"20\" fill=\"#FFF\"/>\n    <ellipse cx=\"-28\" cy=\"2\" rx=\"13\" ry=\"10\" fill=\"#333\"/>\n    <rect x=\"-15\" y=\"12\" width=\"6\" height=\"18\" rx=\"2\" fill=\"#333\"/>\n    <rect x=\"-3\" y=\"12\" width=\"6\" height=\"18\" rx=\"2\" fill=\"#333\"/>\n    <rect x=\"8\" y=\"12\" width=\"6\" height=\"18\" rx=\"2\" fill=\"#333\"/>\n  </g>\n\n  <!-- VILLAGER 1 - Farmer with pitchfork running from left -->\n  <g class=\"villager-1\" transform=\"translate(180, 380)\">\n    <!-- Pitchfork -->\n    <g transform=\"rotate(-30)\">\n      <rect x=\"50\" y=\"-80\" width=\"5\" height=\"100\" fill=\"#8B4513\"/>\n      <path d=\"M45,-80 L45,-95 M52,-80 L52,-95 M59,-80 L59,-95\" stroke=\"#555\" stroke-width=\"3\"/>\n    </g>\n\n    <!-- Body -->\n    <rect x=\"-18\" y=\"10\" width=\"36\" height=\"45\" rx=\"6\" fill=\"#8B4513\"/>\n\n    <!-- Legs running -->\n    <g class=\"villager-leg\">\n      <rect x=\"-15\" y=\"50\" width=\"12\" height=\"40\" rx=\"4\" fill=\"#4A4A6A\"/>\n    </g>\n    <g class=\"villager-leg\" style=\"animation-delay: 0.125s;\">\n      <rect x=\"3\" y=\"50\" width=\"12\" height=\"40\" rx=\"4\" fill=\"#4A4A6A\"/>\n    </g>\n\n    <!-- Arms running -->\n    <g class=\"villager-arm\">\n      <rect x=\"-30\" y=\"15\" width=\"14\" height=\"35\" rx=\"5\" fill=\"url(#skin)\"/>\n    </g>\n    <g class=\"villager-arm\" style=\"animation-delay: 0.125s;\">\n      <rect x=\"16\" y=\"15\" width=\"14\" height=\"35\" rx=\"5\" fill=\"url(#skin)\"/>\n    </g>\n\n    <!-- Head -->\n    <ellipse cx=\"0\" cy=\"-10\" rx=\"22\" ry=\"25\" fill=\"url(#skin)\"/>\n    <!-- Straw hat -->\n    <ellipse cx=\"0\" cy=\"-30\" rx=\"28\" ry=\"8\" fill=\"#DAA520\"/>\n    <ellipse cx=\"0\" cy=\"-35\" rx=\"18\" ry=\"12\" fill=\"#DAA520\"/>\n    <!-- Worried face -->\n    <circle cx=\"-8\" cy=\"-12\" r=\"4\" fill=\"white\"/>\n    <circle cx=\"8\" cy=\"-12\" r=\"4\" fill=\"white\"/>\n    <circle cx=\"-8\" cy=\"-11\" r=\"2\" fill=\"#333\"/>\n    <circle cx=\"8\" cy=\"-11\" r=\"2\" fill=\"#333\"/>\n    <ellipse cx=\"0\" cy=\"2\" rx=\"8\" ry=\"5\" fill=\"#8B0000\"/>\n    <path d=\"M-12,-22 Q-8,-18 -4,-22\" stroke=\"#5D4037\" stroke-width=\"2\" fill=\"none\"/>\n    <path d=\"M4,-22 Q8,-18 12,-22\" stroke=\"#5D4037\" stroke-width=\"2\" fill=\"none\"/>\n  </g>\n\n  <!-- VILLAGER 2 - Baker running from right -->\n  <g class=\"villager-2\" transform=\"translate(780, 390)\">\n    <!-- Rolling pin -->\n    <rect x=\"-60\" y=\"20\" width=\"50\" height=\"8\" rx=\"4\" fill=\"#DEB887\" transform=\"rotate(-20)\"/>\n\n    <!-- Body - white apron -->\n    <rect x=\"-16\" y=\"10\" width=\"32\" height=\"42\" rx=\"5\" fill=\"white\"/>\n    <rect x=\"-20\" y=\"8\" width=\"40\" height=\"20\" rx=\"4\" fill=\"#4169E1\"/>\n\n    <!-- Legs -->\n    <g class=\"villager-leg\">\n      <rect x=\"-14\" y=\"48\" width=\"11\" height=\"38\" rx=\"4\" fill=\"#333\"/>\n    </g>\n    <g class=\"villager-leg\" style=\"animation-delay: 0.125s;\">\n      <rect x=\"3\" y=\"48\" width=\"11\" height=\"38\" rx=\"4\" fill=\"#333\"/>\n    </g>\n\n    <!-- Arms -->\n    <g class=\"villager-arm\">\n      <rect x=\"-28\" y=\"12\" width=\"12\" height=\"32\" rx=\"4\" fill=\"url(#skin)\"/>\n    </g>\n    <g class=\"villager-arm\" style=\"animation-delay: 0.125s;\">\n      <rect x=\"16\" y=\"12\" width=\"12\" height=\"32\" rx=\"4\" fill=\"url(#skin)\"/>\n    </g>\n\n    <!-- Head -->\n    <ellipse cx=\"0\" cy=\"-8\" rx=\"20\" ry=\"22\" fill=\"url(#skin)\"/>\n    <!-- Chef hat -->\n    <rect x=\"-15\" cy=\"-32\" width=\"30\" height=\"25\" rx=\"3\" fill=\"white\"/>\n    <ellipse cx=\"0\" cy=\"-30\" rx=\"18\" ry=\"6\" fill=\"white\"/>\n    <!-- Worried face -->\n    <circle cx=\"-7\" cy=\"-10\" r=\"3.5\" fill=\"white\"/>\n    <circle cx=\"7\" cy=\"-10\" r=\"3.5\" fill=\"white\"/>\n    <circle cx=\"-7\" cy=\"-9\" r=\"1.5\" fill=\"#333\"/>\n    <circle cx=\"7\" cy=\"-9\" r=\"1.5\" fill=\"#333\"/>\n    <ellipse cx=\"0\" cy=\"4\" rx=\"7\" ry=\"4\" fill=\"#8B0000\"/>\n  </g>\n\n  <!-- SHEPHERD BOY - center, arms up shouting -->\n  <g class=\"boy-shouting\" transform=\"translate(480, 300)\">\n    <!-- Crook dropped on ground -->\n    <path d=\"M100,100 L150,120\" stroke=\"#8B4513\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n    <path d=\"M100,100 Q100,70 80,70 Q60,70 60,90\" stroke=\"#8B4513\" stroke-width=\"6\" fill=\"none\" stroke-linecap=\"round\"/>\n\n    <!-- Legs -->\n    <rect x=\"-15\" y=\"70\" width=\"14\" height=\"50\" rx=\"5\" fill=\"#4A4A8A\"/>\n    <rect x=\"1\" y=\"70\" width=\"14\" height=\"50\" rx=\"5\" fill=\"#4A4A8A\"/>\n    <ellipse cx=\"-8\" cy=\"122\" rx=\"10\" ry=\"6\" fill=\"#5D4037\"/>\n    <ellipse cx=\"8\" cy=\"122\" rx=\"10\" ry=\"6\" fill=\"#5D4037\"/>\n\n    <!-- Torso -->\n    <rect x=\"-22\" y=\"20\" width=\"44\" height=\"55\" rx=\"8\" fill=\"#E67E22\"/>\n\n    <!-- Arms raised up -->\n    <g class=\"boy-arm-left\">\n      <rect x=\"-45\" y=\"-20\" width=\"15\" height=\"45\" rx=\"5\" fill=\"url(#skin)\" transform=\"rotate(30)\"/>\n      <circle cx=\"-55\" cy=\"-15\" r=\"8\" fill=\"url(#skin)\"/>\n    </g>\n    <g class=\"boy-arm-right\">\n      <rect x=\"30\" y=\"-20\" width=\"15\" height=\"45\" rx=\"5\" fill=\"url(#skin)\" transform=\"rotate(-30)\"/>\n      <circle cx=\"55\" cy=\"-15\" r=\"8\" fill=\"url(#skin)\"/>\n    </g>\n\n    <!-- Head -->\n    <rect x=\"-8\" y=\"5\" width=\"16\" height=\"18\" fill=\"url(#skin)\"/>\n    <ellipse cx=\"0\" cy=\"-15\" rx=\"28\" ry=\"32\" fill=\"url(#skin)\"/>\n\n    <!-- Hair -->\n    <ellipse cx=\"0\" cy=\"-35\" rx=\"26\" ry=\"18\" fill=\"#5D4037\"/>\n    <ellipse cx=\"-20\" cy=\"-25\" rx=\"10\" ry=\"15\" fill=\"#5D4037\"/>\n    <ellipse cx=\"20\" cy=\"-25\" rx=\"10\" ry=\"15\" fill=\"#5D4037\"/>\n\n    <!-- Excited/mischievous eyes -->\n    <ellipse cx=\"-10\" cy=\"-18\" rx=\"7\" ry=\"6\" fill=\"white\"/>\n    <ellipse cx=\"10\" cy=\"-18\" rx=\"7\" ry=\"6\" fill=\"white\"/>\n    <circle cx=\"-9\" cy=\"-17\" r=\"3.5\" fill=\"#333\"/>\n    <circle cx=\"11\" cy=\"-17\" r=\"3.5\" fill=\"#333\"/>\n    <circle cx=\"-10\" cy=\"-19\" r=\"1\" fill=\"white\"/>\n    <circle cx=\"10\" cy=\"-19\" r=\"1\" fill=\"white\"/>\n\n    <!-- Raised eyebrows -->\n    <path d=\"M-17,-28 Q-10,-32 -3,-28\" stroke=\"#5D4037\" stroke-width=\"2.5\" fill=\"none\"/>\n    <path d=\"M3,-28 Q10,-32 17,-28\" stroke=\"#5D4037\" stroke-width=\"2.5\" fill=\"none\"/>\n\n    <!-- Nose -->\n    <ellipse cx=\"0\" cy=\"-8\" rx=\"4\" ry=\"5\" fill=\"#E8A878\"/>\n\n    <!-- Open mouth shouting -->\n    <g class=\"boy-mouth\">\n      <ellipse cx=\"0\" cy=\"5\" rx=\"12\" ry=\"10\" fill=\"#8B0000\"/>\n      <ellipse cx=\"0\" cy=\"0\" rx=\"10\" ry=\"4\" fill=\"white\"/>\n      <path d=\"M-8,10 Q0,14 8,10\" fill=\"#CC4444\"/>\n    </g>\n\n    <!-- Cheeks flushed -->\n    <circle cx=\"-20\" cy=\"-5\" r=\"8\" fill=\"#FF6B6B\" opacity=\"0.6\"/>\n    <circle cx=\"20\" cy=\"-5\" r=\"8\" fill=\"#FF6B6B\" opacity=\"0.6\"/>\n  </g>\n\n  <!-- Speech bubble -->\n  <g transform=\"translate(480, 120)\">\n    <ellipse cx=\"0\" cy=\"0\" rx=\"120\" ry=\"50\" fill=\"white\" stroke=\"#333\" stroke-width=\"3\"/>\n    <polygon points=\"0,45 -20,80 20,50\" fill=\"white\" stroke=\"#333\" stroke-width=\"3\"/>\n    <polygon points=\"0,45 -18,75 18,48\" fill=\"white\"/>\n    <text x=\"0\" y=\"-5\" text-anchor=\"middle\" font-family=\"Comic Sans MS, cursive\" font-size=\"28\" font-weight=\"bold\" fill=\"#D32F2F\">WOLF!</text>\n    <text x=\"0\" y=\"25\" text-anchor=\"middle\" font-family=\"Comic Sans MS, cursive\" font-size=\"28\" font-weight=\"bold\" fill=\"#D32F2F\">WOLF!</text>\n  </g>\n</svg>\n"

        "svgSrc": "./resources/crying-wolf-2.svg",
        "svgContent": "<svg viewBox=\"0 0 960 540\" xmlns=\"http://www.w3.org/2000/svg\">\n  <defs>\n    <linearGradient id=\"sky\" x1=\"0%\" y1=\"0%\" x2=\"0%\" y2=\"100%\">\n      <stop offset=\"0%\" stop-color=\"#87CEEB\"/>\n      <stop offset=\"100%\" stop-color=\"#E0F4FF\"/>\n    </linearGradient>\n    <linearGradient id=\"hill\" x1=\"0%\" y1=\"0%\" x2=\"0%\" y2=\"100%\">\n      <stop offset=\"0%\" stop-color=\"#7CCD7C\"/>\n      <stop offset=\"100%\" stop-color=\"#228B22\"/>\n    </linearGradient>\n    <linearGradient id=\"skin\" x1=\"0%\" y1=\"0%\" x2=\"0%\" y2=\"100%\">\n      <stop offset=\"0%\" stop-color=\"#FFDAB9\"/>\n      <stop offset=\"100%\" stop-color=\"#E8B896\"/>\n    </linearGradient>\n\n    <style>\n      @keyframes boyLaugh {\n        0%, 100% { transform: translateY(0) rotate(0deg); }\n        25% { transform: translateY(-5px) rotate(-2deg); }\n        75% { transform: translateY(-5px) rotate(2deg); }\n      }\n      @keyframes pointMock {\n        0%, 100% { transform: rotate(-10deg); }\n        50% { transform: rotate(10deg); }\n      }\n\n      @keyframes villagerAngry {\n        0%, 100% { transform: translateY(0); }\n        50% { transform: translateY(-3px); }\n      }\n      @keyframes fistShake {\n        0%, 100% { transform: rotate(-15deg); }\n        50% { transform: rotate(15deg); }\n      }\n      @keyframes stomp {\n        0%, 100% { transform: rotate(0deg); }\n        50% { transform: rotate(-5deg); }\n      }\n\n      @keyframes angerVein {\n        0%, 100% { opacity: 1; transform: scale(1); }\n        50% { opacity: 0.7; transform: scale(1.2); }\n      }\n\n      .boy-laughing { animation: boyLaugh 0.4s ease-in-out infinite; }\n      .boy-point { animation: pointMock 0.6s ease-in-out infinite; transform-origin: top center; }\n\n      .villager-angry { animation: villagerAngry 0.3s ease-in-out infinite; }\n      .villager-fist { animation: fistShake 0.25s ease-in-out infinite; transform-origin: top center; }\n      .villager-stomp { animation: stomp 0.4s ease-in-out infinite; transform-origin: top center; }\n\n      .anger-vein { animation: angerVein 0.5s ease-in-out infinite; }\n    </style>\n  </defs>\n\n  <!-- Sky -->\n  <rect width=\"960\" height=\"540\" fill=\"url(#sky)\"/>\n  <circle cx=\"820\" cy=\"80\" r=\"50\" fill=\"#FFD700\" opacity=\"0.9\"/>\n\n  <!-- Hills -->\n  <ellipse cx=\"200\" cy=\"350\" rx=\"300\" ry=\"120\" fill=\"#6B8E6B\"/>\n  <ellipse cx=\"700\" cy=\"360\" rx=\"350\" ry=\"100\" fill=\"#5F9F5F\"/>\n  <ellipse cx=\"480\" cy=\"600\" rx=\"600\" ry=\"280\" fill=\"url(#hill)\"/>\n\n  <!-- Sheep in background, calm -->\n  <g transform=\"translate(700, 400)\">\n    <ellipse cx=\"0\" cy=\"0\" rx=\"32\" ry=\"22\" fill=\"#FFF\"/>\n    <ellipse cx=\"30\" cy=\"2\" rx=\"14\" ry=\"10\" fill=\"#333\"/>\n    <rect x=\"-16\" y=\"14\" width=\"6\" height=\"18\" rx=\"2\" fill=\"#333\"/>\n    <rect x=\"-4\" y=\"14\" width=\"6\" height=\"18\" rx=\"2\" fill=\"#333\"/>\n    <rect x=\"8\" y=\"14\" width=\"6\" height=\"18\" rx=\"2\" fill=\"#333\"/>\n    <rect x=\"18\" y=\"14\" width=\"6\" height=\"18\" rx=\"2\" fill=\"#333\"/>\n  </g>\n\n  <!-- ANGRY VILLAGER 1 - Farmer, very mad -->\n  <g class=\"villager-angry\" transform=\"translate(200, 350)\">\n    <!-- Body -->\n    <rect x=\"-18\" y=\"10\" width=\"36\" height=\"48\" rx=\"6\" fill=\"#8B4513\"/>\n\n    <!-- Legs stomping -->\n    <g class=\"villager-stomp\">\n      <rect x=\"-15\" y=\"55\" width=\"12\" height=\"42\" rx=\"4\" fill=\"#4A4A6A\"/>\n    </g>\n    <rect x=\"3\" y=\"55\" width=\"12\" height=\"42\" rx=\"4\" fill=\"#4A4A6A\"/>\n\n    <!-- Arms - fist raised -->\n    <rect x=\"-30\" y=\"15\" width=\"14\" height=\"35\" rx=\"5\" fill=\"url(#skin)\"/>\n    <g class=\"villager-fist\">\n      <rect x=\"16\" y=\"-15\" width=\"14\" height=\"40\" rx=\"5\" fill=\"url(#skin)\"/>\n      <ellipse cx=\"23\" cy=\"-20\" rx=\"10\" ry=\"8\" fill=\"url(#skin)\"/>\n    </g>\n\n    <!-- Head -->\n    <ellipse cx=\"0\" cy=\"-12\" rx=\"24\" ry=\"28\" fill=\"url(#skin)\"/>\n    <!-- Straw hat askew -->\n    <ellipse cx=\"5\" cy=\"-35\" rx=\"28\" ry=\"8\" fill=\"#DAA520\" transform=\"rotate(10)\"/>\n\n    <!-- ANGRY face -->\n    <ellipse cx=\"-9\" cy=\"-14\" rx=\"5\" ry=\"4\" fill=\"white\"/>\n    <ellipse cx=\"9\" cy=\"-14\" rx=\"5\" ry=\"4\" fill=\"white\"/>\n    <circle cx=\"-9\" cy=\"-13\" r=\"2.5\" fill=\"#333\"/>\n    <circle cx=\"9\" cy=\"-13\" r=\"2.5\" fill=\"#333\"/>\n    <!-- Angry eyebrows -->\n    <path d=\"M-16,-22 L-2,-18\" stroke=\"#5D4037\" stroke-width=\"3\" fill=\"none\"/>\n    <path d=\"M2,-18 L16,-22\" stroke=\"#5D4037\" stroke-width=\"3\" fill=\"none\"/>\n    <!-- Angry mouth -->\n    <path d=\"M-10,2 Q0,8 10,2\" stroke=\"#333\" stroke-width=\"3\" fill=\"none\"/>\n\n    <!-- Anger veins -->\n    <g class=\"anger-vein\">\n      <path d=\"M20,-25 L25,-30 L22,-25 L28,-28\" stroke=\"#D32F2F\" stroke-width=\"2\" fill=\"none\"/>\n    </g>\n\n    <!-- Red face -->\n    <circle cx=\"-16\" cy=\"-5\" r=\"8\" fill=\"#FF6B6B\" opacity=\"0.7\"/>\n    <circle cx=\"16\" cy=\"-5\" r=\"8\" fill=\"#FF6B6B\" opacity=\"0.7\"/>\n  </g>\n\n  <!-- ANGRY VILLAGER 2 - Baker, arms crossed -->\n  <g class=\"villager-angry\" style=\"animation-delay: 0.15s;\" transform=\"translate(750, 360)\">\n    <!-- Body -->\n    <rect x=\"-16\" y=\"8\" width=\"32\" height=\"45\" rx=\"5\" fill=\"white\"/>\n    <rect x=\"-20\" y=\"5\" width=\"40\" height=\"18\" rx=\"4\" fill=\"#4169E1\"/>\n\n    <!-- Legs -->\n    <rect x=\"-14\" y=\"50\" width=\"11\" height=\"40\" rx=\"4\" fill=\"#333\"/>\n    <rect x=\"3\" y=\"50\" width=\"11\" height=\"40\" rx=\"4\" fill=\"#333\"/>\n\n    <!-- Arms crossed -->\n    <rect x=\"-28\" y=\"18\" width=\"56\" height=\"12\" rx=\"4\" fill=\"url(#skin)\"/>\n    <ellipse cx=\"-28\" cy=\"24\" rx=\"8\" ry=\"6\" fill=\"url(#skin)\"/>\n    <ellipse cx=\"28\" cy=\"24\" rx=\"8\" ry=\"6\" fill=\"url(#skin)\"/>\n\n    <!-- Head -->\n    <ellipse cx=\"0\" cy=\"-10\" rx=\"22\" ry=\"25\" fill=\"url(#skin)\"/>\n    <!-- Chef hat tilted angrily -->\n    <rect x=\"-12\" y=\"-38\" width=\"28\" height=\"22\" rx=\"3\" fill=\"white\" transform=\"rotate(-8)\"/>\n\n    <!-- Skeptical/angry face -->\n    <ellipse cx=\"-8\" cy=\"-12\" rx=\"4\" ry=\"3.5\" fill=\"white\"/>\n    <ellipse cx=\"8\" cy=\"-12\" rx=\"4\" ry=\"3.5\" fill=\"white\"/>\n    <circle cx=\"-8\" cy=\"-11\" r=\"2\" fill=\"#333\"/>\n    <circle cx=\"8\" cy=\"-11\" r=\"2\" fill=\"#333\"/>\n    <!-- Angry V eyebrows -->\n    <path d=\"M-14,-20 L-2,-16\" stroke=\"#5D4037\" stroke-width=\"2.5\" fill=\"none\"/>\n    <path d=\"M2,-16 L14,-20\" stroke=\"#5D4037\" stroke-width=\"2.5\" fill=\"none\"/>\n    <!-- Frown -->\n    <path d=\"M-7,4 Q0,-2 7,4\" stroke=\"#333\" stroke-width=\"2.5\" fill=\"none\"/>\n\n    <!-- Anger vein -->\n    <g class=\"anger-vein\" style=\"animation-delay: 0.2s;\">\n      <path d=\"M-20,-20 L-25,-25 L-22,-20 L-28,-22\" stroke=\"#D32F2F\" stroke-width=\"2\" fill=\"none\"/>\n    </g>\n  </g>\n\n  <!-- SHEPHERD BOY - laughing, pointing -->\n  <g class=\"boy-laughing\" transform=\"translate(480, 300)\">\n    <!-- Legs -->\n    <rect x=\"-15\" y=\"70\" width=\"14\" height=\"50\" rx=\"5\" fill=\"#4A4A8A\"/>\n    <rect x=\"1\" y=\"70\" width=\"14\" height=\"50\" rx=\"5\" fill=\"#4A4A8A\"/>\n    <ellipse cx=\"-8\" cy=\"122\" rx=\"10\" ry=\"6\" fill=\"#5D4037\"/>\n    <ellipse cx=\"8\" cy=\"122\" rx=\"10\" ry=\"6\" fill=\"#5D4037\"/>\n\n    <!-- Torso bent forward laughing -->\n    <rect x=\"-22\" y=\"20\" width=\"44\" height=\"55\" rx=\"8\" fill=\"#E67E22\" transform=\"rotate(5)\"/>\n\n    <!-- Arms - one pointing, one holding belly -->\n    <g class=\"boy-point\">\n      <rect x=\"-50\" y=\"25\" width=\"14\" height=\"40\" rx=\"5\" fill=\"url(#skin)\" transform=\"rotate(-30)\"/>\n      <circle cx=\"-70\" cy=\"15\" r=\"8\" fill=\"url(#skin)\"/>\n    </g>\n    <rect x=\"18\" y=\"40\" width=\"14\" height=\"30\" rx=\"5\" fill=\"url(#skin)\"/>\n    <circle cx=\"25\" cy=\"72\" r=\"8\" fill=\"url(#skin)\"/>\n\n    <!-- Head tilted back laughing -->\n    <rect x=\"-8\" y=\"5\" width=\"16\" height=\"18\" fill=\"url(#skin)\"/>\n    <ellipse cx=\"0\" cy=\"-15\" rx=\"28\" ry=\"32\" fill=\"url(#skin)\"/>\n\n    <!-- Hair -->\n    <ellipse cx=\"0\" cy=\"-35\" rx=\"26\" ry=\"18\" fill=\"#5D4037\"/>\n    <ellipse cx=\"-20\" cy=\"-25\" rx=\"10\" ry=\"15\" fill=\"#5D4037\"/>\n    <ellipse cx=\"20\" cy=\"-25\" rx=\"10\" ry=\"15\" fill=\"#5D4037\"/>\n\n    <!-- Laughing eyes - closed crescents -->\n    <path d=\"M-15,-18 Q-10,-12 -5,-18\" stroke=\"#333\" stroke-width=\"3\" fill=\"none\"/>\n    <path d=\"M5,-18 Q10,-12 15,-18\" stroke=\"#333\" stroke-width=\"3\" fill=\"none\"/>\n\n    <!-- Nose -->\n    <ellipse cx=\"0\" cy=\"-8\" rx=\"4\" ry=\"5\" fill=\"#E8A878\"/>\n\n    <!-- Big laughing mouth -->\n    <ellipse cx=\"0\" cy=\"5\" rx=\"15\" ry=\"12\" fill=\"#8B0000\"/>\n    <ellipse cx=\"0\" cy=\"0\" rx=\"12\" ry=\"5\" fill=\"white\"/>\n    <path d=\"M-12,8 Q0,15 12,8\" fill=\"#CC6666\"/>\n\n    <!-- Tears of laughter -->\n    <path d=\"M-22,-15 Q-25,-10 -22,-5\" stroke=\"#87CEEB\" stroke-width=\"2\" fill=\"none\"/>\n    <path d=\"M22,-15 Q25,-10 22,-5\" stroke=\"#87CEEB\" stroke-width=\"2\" fill=\"none\"/>\n\n    <!-- Rosy cheeks -->\n    <circle cx=\"-20\" cy=\"-2\" r=\"8\" fill=\"#FF9999\" opacity=\"0.7\"/>\n    <circle cx=\"20\" cy=\"-2\" r=\"8\" fill=\"#FF9999\" opacity=\"0.7\"/>\n  </g>\n\n  <!-- Speech bubble - \"Ha ha! Fooled you again!\" -->\n  <g transform=\"translate(480, 130)\">\n    <ellipse cx=\"0\" cy=\"0\" rx=\"140\" ry=\"45\" fill=\"white\" stroke=\"#333\" stroke-width=\"3\"/>\n    <polygon points=\"10,42 -10,80 30,48\" fill=\"white\" stroke=\"#333\" stroke-width=\"3\"/>\n    <polygon points=\"10,42 -8,75 28,46\" fill=\"white\"/>\n    <text x=\"0\" y=\"8\" text-anchor=\"middle\" font-family=\"Comic Sans MS, cursive\" font-size=\"22\" fill=\"#333\">Ha ha! Fooled you</text>\n    <text x=\"0\" y=\"32\" text-anchor=\"middle\" font-family=\"Comic Sans MS, cursive\" font-size=\"22\" fill=\"#333\">AGAIN!</text>\n  </g>\n\n  <!-- Angry speech bubble from villager -->\n  <g transform=\"translate(200, 230)\">\n    <ellipse cx=\"0\" cy=\"0\" rx=\"100\" ry=\"35\" fill=\"white\" stroke=\"#D32F2F\" stroke-width=\"3\"/>\n    <polygon points=\"0,32 10,60 -15,38\" fill=\"white\" stroke=\"#D32F2F\" stroke-width=\"3\"/>\n    <polygon points=\"0,32 8,55 -13,36\" fill=\"white\"/>\n    <text x=\"0\" y=\"8\" text-anchor=\"middle\" font-family=\"Comic Sans MS, cursive\" font-size=\"18\" fill=\"#D32F2F\">Never again!</text>\n  </g>\n</svg>\n"

        "svgSrc": "./resources/wolf-attack.svg",
        "svgContent": "<svg viewBox=\"0 0 960 540\" xmlns=\"http://www.w3.org/2000/svg\">\n  <defs>\n    <linearGradient id=\"duskSky\" x1=\"0%\" y1=\"0%\" x2=\"0%\" y2=\"100%\">\n      <stop offset=\"0%\" stop-color=\"#4A3F55\"/>\n      <stop offset=\"40%\" stop-color=\"#8B6B8C\"/>\n      <stop offset=\"100%\" stop-color=\"#D4A574\"/>\n    </linearGradient>\n    <linearGradient id=\"darkHill\" x1=\"0%\" y1=\"0%\" x2=\"0%\" y2=\"100%\">\n      <stop offset=\"0%\" stop-color=\"#3D5C3D\"/>\n      <stop offset=\"100%\" stop-color=\"#1A3A1A\"/>\n    </linearGradient>\n    <linearGradient id=\"wolfFur\" x1=\"0%\" y1=\"0%\" x2=\"100%\" y2=\"100%\">\n      <stop offset=\"0%\" stop-color=\"#5A5A5A\"/>\n      <stop offset=\"100%\" stop-color=\"#3A3A3A\"/>\n    </linearGradient>\n    <linearGradient id=\"skin\" x1=\"0%\" y1=\"0%\" x2=\"0%\" y2=\"100%\">\n      <stop offset=\"0%\" stop-color=\"#FFDAB9\"/>\n      <stop offset=\"100%\" stop-color=\"#E8B896\"/>\n    </linearGradient>\n\n    <filter id=\"eyeGlow\">\n      <feGaussianBlur stdDeviation=\"3\" result=\"blur\"/>\n      <feMerge>\n        <feMergeNode in=\"blur\"/>\n        <feMergeNode in=\"SourceGraphic\"/>\n      </feMerge>\n    </filter>\n\n    <style>\n      /* Wolf animations - menacing */\n      @keyframes wolfStalk {\n        0%, 100% { transform: translateX(0); }\n        50% { transform: translateX(10px); }\n      }\n      @keyframes wolfBreath {\n        0%, 100% { transform: scaleX(1); }\n        50% { transform: scaleX(1.03); }\n      }\n      @keyframes eyePulse {\n        0%, 100% { fill: #FFD700; filter: url(#eyeGlow); }\n        50% { fill: #FF4500; }\n      }\n      @keyframes jawSnap {\n        0%, 80%, 100% { transform: rotate(0deg); }\n        85%, 95% { transform: rotate(10deg); }\n      }\n      @keyframes tailThreat {\n        0%, 100% { transform: rotate(0deg); }\n        30% { transform: rotate(-10deg); }\n        70% { transform: rotate(10deg); }\n      }\n\n      /* Boy terrified animations */\n      @keyframes boyShake {\n        0%, 100% { transform: translateX(0) rotate(0deg); }\n        25% { transform: translateX(-5px) rotate(-2deg); }\n        75% { transform: translateX(5px) rotate(2deg); }\n      }\n      @keyframes armsUp {\n        0%, 100% { transform: rotate(-5deg); }\n        50% { transform: rotate(5deg); }\n      }\n      @keyframes kneesKnock {\n        0%, 100% { transform: rotate(-3deg); }\n        50% { transform: rotate(3deg); }\n      }\n\n      /* Sheep fleeing */\n      @keyframes sheepFlee {\n        0% { transform: translateX(0) scale(1); }\n        100% { transform: translateX(-150px) scale(0.6); }\n      }\n\n      .wolf { animation: wolfStalk 2s ease-in-out infinite; }\n      .wolf-body { animation: wolfBreath 1.5s ease-in-out infinite; }\n      .wolf-eye { animation: eyePulse 1s ease-in-out infinite; }\n      .wolf-jaw { animation: jawSnap 3s ease-in-out infinite; transform-origin: right center; }\n      .wolf-tail { animation: tailThreat 1.5s ease-in-out infinite; transform-origin: left center; }\n\n      .boy-scared { animation: boyShake 0.2s ease-in-out infinite; }\n      .boy-arm-scared { animation: armsUp 0.3s ease-in-out infinite; transform-origin: bottom center; }\n      .boy-leg-scared { animation: kneesKnock 0.25s ease-in-out infinite; transform-origin: top center; }\n\n      .sheep-run-1 { animation: sheepFlee 4s ease-in forwards; }\n      .sheep-run-2 { animation: sheepFlee 4.5s ease-in forwards 0.3s; }\n    </style>\n  </defs>\n\n  <!-- Dusk sky -->\n  <rect width=\"960\" height=\"540\" fill=\"url(#duskSky)\"/>\n\n  <!-- Setting sun -->\n  <circle cx=\"880\" cy=\"200\" r=\"60\" fill=\"#FF6347\" opacity=\"0.6\"/>\n  <circle cx=\"880\" cy=\"200\" r=\"80\" fill=\"#FF6347\" opacity=\"0.2\"/>\n\n  <!-- Dark hills -->\n  <ellipse cx=\"200\" cy=\"380\" rx=\"350\" ry=\"150\" fill=\"#2D4A2D\"/>\n  <ellipse cx=\"750\" cy=\"400\" rx=\"400\" ry=\"120\" fill=\"#254025\"/>\n  <ellipse cx=\"480\" cy=\"620\" rx=\"650\" ry=\"300\" fill=\"url(#darkHill)\"/>\n\n  <!-- Fleeing sheep -->\n  <g class=\"sheep-run-1\" transform=\"translate(200, 420)\">\n    <ellipse cx=\"0\" cy=\"0\" rx=\"30\" ry=\"20\" fill=\"#EEE\"/>\n    <ellipse cx=\"28\" cy=\"2\" rx=\"12\" ry=\"9\" fill=\"#333\"/>\n    <rect x=\"-15\" y=\"12\" width=\"6\" height=\"16\" rx=\"2\" fill=\"#333\"/>\n    <rect x=\"-3\" y=\"12\" width=\"6\" height=\"16\" rx=\"2\" fill=\"#333\"/>\n    <rect x=\"8\" y=\"12\" width=\"6\" height=\"16\" rx=\"2\" fill=\"#333\"/>\n  </g>\n  <g class=\"sheep-run-2\" transform=\"translate(280, 400)\">\n    <ellipse cx=\"0\" cy=\"0\" rx=\"25\" ry=\"17\" fill=\"#EEE\"/>\n    <ellipse cx=\"23\" cy=\"1\" rx=\"10\" ry=\"8\" fill=\"#333\"/>\n    <rect x=\"-12\" y=\"10\" width=\"5\" height=\"14\" rx=\"2\" fill=\"#333\"/>\n    <rect x=\"2\" y=\"10\" width=\"5\" height=\"14\" rx=\"2\" fill=\"#333\"/>\n  </g>\n\n  <!-- THE WOLF - menacing -->\n  <g class=\"wolf\" transform=\"translate(650, 320)\">\n    <g class=\"wolf-body\">\n      <!-- Tail -->\n      <g class=\"wolf-tail\">\n        <path d=\"M120,30 Q160,10 175,25 Q165,45 140,45 Q120,50 120,30\" fill=\"url(#wolfFur)\"/>\n      </g>\n\n      <!-- Back legs -->\n      <rect x=\"90\" y=\"55\" width=\"18\" height=\"50\" rx=\"6\" fill=\"url(#wolfFur)\"/>\n      <rect x=\"110\" y=\"50\" width=\"18\" height=\"55\" rx=\"6\" fill=\"url(#wolfFur)\"/>\n\n      <!-- Body -->\n      <ellipse cx=\"60\" cy=\"35\" rx=\"70\" ry=\"40\" fill=\"url(#wolfFur)\"/>\n\n      <!-- Front legs - crouched -->\n      <rect x=\"-10\" y=\"50\" width=\"18\" height=\"50\" rx=\"6\" fill=\"url(#wolfFur)\"/>\n      <rect x=\"10\" y=\"45\" width=\"18\" height=\"55\" rx=\"6\" fill=\"url(#wolfFur)\"/>\n\n      <!-- Chest -->\n      <ellipse cx=\"-5\" cy=\"30\" rx=\"35\" ry=\"35\" fill=\"url(#wolfFur)\"/>\n\n      <!-- Neck -->\n      <path d=\"M-30,15 Q-50,0 -55,10 Q-60,20 -45,30 L-30,35\" fill=\"url(#wolfFur)\"/>\n\n      <!-- Head -->\n      <ellipse cx=\"-70\" cy=\"5\" rx=\"40\" ry=\"30\" fill=\"url(#wolfFur)\"/>\n\n      <!-- Snout -->\n      <path d=\"M-100,10 Q-130,10 -135,15 Q-130,25 -100,20 Q-85,18 -85,10 Q-85,5 -100,10\" fill=\"#4A4A4A\"/>\n\n      <!-- Nose -->\n      <ellipse cx=\"-130\" cy=\"15\" rx=\"8\" ry=\"6\" fill=\"#1A1A1A\"/>\n\n      <!-- Jaw with teeth -->\n      <g class=\"wolf-jaw\">\n        <path d=\"M-130,20 Q-110,35 -85,25\" fill=\"#4A4A4A\"/>\n        <!-- Teeth -->\n        <path d=\"M-120,22 L-118,30 L-114,22 L-110,28 L-106,22 L-102,26 L-98,22\" fill=\"white\" stroke=\"white\" stroke-width=\"1\"/>\n      </g>\n\n      <!-- Drool -->\n      <path d=\"M-115,28 Q-117,38 -115,45\" stroke=\"#AAA\" stroke-width=\"2\" fill=\"none\" opacity=\"0.7\"/>\n\n      <!-- Eyes - glowing -->\n      <g class=\"wolf-eye\" filter=\"url(#eyeGlow)\">\n        <ellipse cx=\"-85\" cy=\"-5\" rx=\"10\" ry=\"8\" fill=\"#FFD700\"/>\n        <ellipse cx=\"-85\" cy=\"-5\" rx=\"4\" ry=\"6\" fill=\"#000\"/>\n      </g>\n      <g class=\"wolf-eye\" style=\"animation-delay: 0.1s;\" filter=\"url(#eyeGlow)\">\n        <ellipse cx=\"-55\" cy=\"-8\" rx=\"9\" ry=\"7\" fill=\"#FFD700\"/>\n        <ellipse cx=\"-55\" cy=\"-8\" rx=\"3.5\" ry=\"5.5\" fill=\"#000\"/>\n      </g>\n\n      <!-- Angry brow -->\n      <path d=\"M-95,-12 Q-85,-18 -75,-12\" stroke=\"#2A2A2A\" stroke-width=\"4\" fill=\"none\"/>\n      <path d=\"M-65,-15 Q-55,-20 -45,-15\" stroke=\"#2A2A2A\" stroke-width=\"4\" fill=\"none\"/>\n\n      <!-- Ears - alert -->\n      <path d=\"M-75,-20 L-85,-55 L-60,-30 Z\" fill=\"url(#wolfFur)\"/>\n      <path d=\"M-45,-25 L-50,-60 L-30,-35 Z\" fill=\"url(#wolfFur)\"/>\n      <path d=\"M-75,-25 L-82,-45 L-62,-32 Z\" fill=\"#5A3A3A\"/>\n      <path d=\"M-47,-28 L-50,-50 L-35,-38 Z\" fill=\"#5A3A3A\"/>\n    </g>\n  </g>\n\n  <!-- SHEPHERD BOY - terrified -->\n  <g class=\"boy-scared\" transform=\"translate(200, 320)\">\n    <!-- Legs shaking -->\n    <g class=\"boy-leg-scared\">\n      <rect x=\"-18\" y=\"70\" width=\"15\" height=\"50\" rx=\"5\" fill=\"#4A4A8A\"/>\n    </g>\n    <g class=\"boy-leg-scared\" style=\"animation-delay: 0.1s;\">\n      <rect x=\"3\" y=\"70\" width=\"15\" height=\"50\" rx=\"5\" fill=\"#4A4A8A\"/>\n    </g>\n    <ellipse cx=\"-10\" cy=\"122\" rx=\"10\" ry=\"6\" fill=\"#5D4037\"/>\n    <ellipse cx=\"10\" cy=\"122\" rx=\"10\" ry=\"6\" fill=\"#5D4037\"/>\n\n    <!-- Torso leaning back -->\n    <rect x=\"-24\" y=\"18\" width=\"48\" height=\"58\" rx=\"8\" fill=\"#E67E22\" transform=\"rotate(-10)\"/>\n\n    <!-- Arms up in defense -->\n    <g class=\"boy-arm-scared\">\n      <rect x=\"-55\" y=\"-30\" width=\"16\" height=\"50\" rx=\"5\" fill=\"url(#skin)\" transform=\"rotate(20)\"/>\n      <circle cx=\"-65\" cy=\"-40\" r=\"9\" fill=\"url(#skin)\"/>\n    </g>\n    <g class=\"boy-arm-scared\" style=\"animation-delay: 0.15s;\">\n      <rect x=\"40\" y=\"-25\" width=\"16\" height=\"50\" rx=\"5\" fill=\"url(#skin)\" transform=\"rotate(-20)\"/>\n      <circle cx=\"60\" cy=\"-35\" r=\"9\" fill=\"url(#skin)\"/>\n    </g>\n\n    <!-- Head -->\n    <rect x=\"-8\" y=\"2\" width=\"16\" height=\"20\" fill=\"url(#skin)\"/>\n    <ellipse cx=\"0\" cy=\"-18\" rx=\"30\" ry=\"35\" fill=\"url(#skin)\"/>\n\n    <!-- Hair standing up -->\n    <ellipse cx=\"0\" cy=\"-42\" rx=\"28\" ry=\"20\" fill=\"#5D4037\"/>\n    <path d=\"M-20,-55 L-15,-40 L-10,-58 L-5,-42 L0,-60 L5,-42 L10,-58 L15,-40 L20,-55\" fill=\"#5D4037\"/>\n\n    <!-- Terrified eyes - wide -->\n    <ellipse cx=\"-11\" cy=\"-20\" rx=\"10\" ry=\"12\" fill=\"white\"/>\n    <ellipse cx=\"11\" cy=\"-20\" rx=\"10\" ry=\"12\" fill=\"white\"/>\n    <circle cx=\"-11\" cy=\"-18\" r=\"5\" fill=\"#333\"/>\n    <circle cx=\"11\" cy=\"-18\" r=\"5\" fill=\"#333\"/>\n    <circle cx=\"-12\" cy=\"-20\" r=\"2\" fill=\"white\"/>\n    <circle cx=\"10\" cy=\"-20\" r=\"2\" fill=\"white\"/>\n\n    <!-- Raised terrified eyebrows -->\n    <path d=\"M-22,-35 Q-11,-42 0,-35\" stroke=\"#5D4037\" stroke-width=\"3\" fill=\"none\"/>\n    <path d=\"M0,-35 Q11,-42 22,-35\" stroke=\"#5D4037\" stroke-width=\"3\" fill=\"none\"/>\n\n    <!-- Nose -->\n    <ellipse cx=\"0\" cy=\"-5\" rx=\"4\" ry=\"5\" fill=\"#E8A878\"/>\n\n    <!-- Screaming mouth -->\n    <ellipse cx=\"0\" cy=\"10\" rx=\"18\" ry=\"15\" fill=\"#000\"/>\n    <ellipse cx=\"0\" cy=\"5\" rx=\"15\" ry=\"6\" fill=\"white\"/>\n    <ellipse cx=\"0\" cy=\"20\" rx=\"10\" ry=\"5\" fill=\"#8B0000\"/>\n\n    <!-- Sweat drops -->\n    <ellipse cx=\"-28\" cy=\"-15\" rx=\"4\" ry=\"6\" fill=\"#87CEEB\"/>\n    <ellipse cx=\"28\" cy=\"-10\" rx=\"4\" ry=\"6\" fill=\"#87CEEB\"/>\n    <ellipse cx=\"-25\" cy=\"0\" rx=\"3\" ry=\"5\" fill=\"#87CEEB\"/>\n\n    <!-- Pale face -->\n    <ellipse cx=\"0\" cy=\"-18\" rx=\"28\" ry=\"33\" fill=\"#F5F5DC\" opacity=\"0.3\"/>\n  </g>\n\n  <!-- Speech bubble - HELP! -->\n  <g transform=\"translate(200, 160)\">\n    <ellipse cx=\"0\" cy=\"0\" rx=\"100\" ry=\"50\" fill=\"white\" stroke=\"#D32F2F\" stroke-width=\"4\"/>\n    <polygon points=\"20,45 40,90 50,50\" fill=\"white\" stroke=\"#D32F2F\" stroke-width=\"4\"/>\n    <polygon points=\"22,45 38,85 48,48\" fill=\"white\"/>\n    <text x=\"0\" y=\"-8\" text-anchor=\"middle\" font-family=\"Impact, sans-serif\" font-size=\"32\" fill=\"#D32F2F\">HELP!</text>\n    <text x=\"0\" y=\"25\" text-anchor=\"middle\" font-family=\"Impact, sans-serif\" font-size=\"24\" fill=\"#D32F2F\">WOLF!</text>\n  </g>\n\n  <!-- Ominous text at bottom -->\n  <text x=\"480\" y=\"520\" text-anchor=\"middle\" font-family=\"Georgia, serif\" font-size=\"20\" fill=\"#FFE4B5\" font-style=\"italic\">But no one came...</text>\n</svg>\n"

const EventBus = (() => {
  const listeners = new Map();
  return {
    on(event, callback) {
      if (!listeners.has(event)) listeners.set(event, new Set());
      listeners.get(event).add(callback);
      return () => listeners.get(event).delete(callback);
    },
    emit(event, payload) {
      if (listeners.has(event)) {
        listeners.get(event).forEach(cb => {
          try { cb(payload); } catch (e) { console.error(e); }
        });
      }
    },
    once(event, callback) {
      const unsub = this.on(event, (payload) => { unsub(); callback(payload); });
    }
  };
})();

        if (entity.originalSmilAttrs) {
          for (const attr of entity.originalSmilAttrs) {
            if (attr.dur) { const d = parseSmilTime(attr.dur); if (d !== null) attr.element.setAttribute('dur', formatSmilTime(d / speed)); }
            if (attr.begin) { const b = parseSmilTime(attr.begin); if (b !== null) attr.element.setAttribute('begin', formatSmilTime(b / speed)); }
          }
        }
      }
    }
    async load(sceneJson) {
      this.scene = sceneJson;
      const { stage } = sceneJson;
      this.mount.innerHTML = "";
      this.stage = new SceneStage({ mount: this.mount, width: stage?.width ?? 960, height: stage?.height ?? 540, background: stage?.background ?? "#fff" });
      this.entities.clear();
      const entities = sceneJson.entities ?? {};
      for (const [id, spec] of Object.entries(entities)) {
        if (spec.type === "stickActor") {
          this.entities.set(id, new StickActor(this.stage, id, spec));
        } else if (spec.type === "chatPanel") {
          const panel = el("div", { className: "ssp-chat" });
          panel.style.left = (spec.x ?? 0) + "px"; panel.style.top = (spec.y ?? 0) + "px";
          panel.style.width = (spec.width ?? 320) + "px"; panel.style.height = (spec.height ?? 240) + "px";
          this.stage.overlay.appendChild(panel);
          this.entities.set(id, { kind: "chatPanel", el: panel });
        } else if (spec.type === "codeEditor") {
          const editor = el("div", { className: "ssp-code" });
          editor.style.left = (spec.x ?? 0) + "px"; editor.style.top = (spec.y ?? 0) + "px";
          editor.style.width = (spec.width ?? 560) + "px"; editor.style.height = (spec.height ?? 260) + "px";
          editor.textContent = spec.initialText ?? "";
          this.stage.overlay.appendChild(editor);
          this.entities.set(id, { kind: "codeEditor", el: editor, text: spec.initialText ?? "" });
        } else if (spec.type === "title") {
          const title = el("div", { className: "ssp-title" });
          title.style.left = (spec.x ?? 0) + "px"; title.style.top = (spec.y ?? 0) + "px";
          title.style.width = (spec.width ?? 400) + "px";
          title.textContent = spec.text ?? "";
          if (spec.fontSize) title.style.fontSize = spec.fontSize + "px";
          if (spec.color) title.style.color = spec.color;
          this.stage.overlay.appendChild(title);
          this.entities.set(id, { kind: "title", el: title });
        } else if (spec.type === "whiteboard") {
          const board = el("div", { className: "ssp-whiteboard" });
          board.style.left = (spec.x ?? 0) + "px"; board.style.top = (spec.y ?? 0) + "px";
          board.style.width = (spec.width ?? 400) + "px"; board.style.height = (spec.height ?? 300) + "px";
          board.textContent = spec.initialText ?? "";
          if (spec.fontSize) board.style.fontSize = spec.fontSize + "px";
          if (spec.color) board.style.color = spec.color;
          this.stage.overlay.appendChild(board);
          this.entities.set(id, { kind: "whiteboard", el: board, text: spec.initialText ?? "" });
        } else if (spec.type === "svgCanvas") {
          const container = el("div", { className: "ssp-svg-canvas" });
          container.style.cssText = `position: absolute; left: ${spec.x ?? 0}px; top: ${spec.y ?? 0}px; width: ${spec.width ?? 400}px; height: ${spec.height ?? 300}px; overflow: hidden; pointer-events: none;`;
          const svgContent = spec.svgContent || '';
          const svgWrapper = document.createElement("div");
          svgWrapper.innerHTML = svgContent || '<svg viewBox="0 0 400 100"><text x="10" y="30" fill="#888">No SVG content</text></svg>';
          const svgElement = svgWrapper.querySelector("svg");
          const originalSmilAttrs = [];
          if (svgElement) {
            svgElement.setAttribute("width", "100%"); svgElement.setAttribute("height", "100%");
            svgElement.style.display = "block";
            container.appendChild(svgElement);
            const smilElements = svgElement.querySelectorAll('animate, animateMotion, animateTransform, set');
            smilElements.forEach((el) => { originalSmilAttrs.push({ element: el, dur: el.getAttribute('dur'), begin: el.getAttribute('begin') }); });
          }
          this.stage.overlay.appendChild(container);
          this.entities.set(id, { kind: "svgCanvas", el: container, svg: svgElement, spec: spec, originalSmilAttrs: originalSmilAttrs });
        }
      }
      this.currentStepIndex = 0;
      this._updateSvgAnimationSpeeds();
      EventBus.emit('scene:loaded', { sceneId: sceneJson.id, scene: sceneJson });
      return this;
    }
    registerSkill(name, fn) { this.skills.set(name, fn); }
    async play() {
      if (!this.scene) throw new Error("No scene loaded.");
      this.isPlaying = true; this.isPaused = false;
      EventBus.emit('scene:play', { sceneId: this.scene.id });
      try {
        const timeline = this.scene.timeline ?? [];
        for (let i = this.currentStepIndex; i < timeline.length; i++) {
          if (!this.isPlaying) break;
          while (this.isPaused && this.isPlaying) { await sleep(50); }
          this.currentStepIndex = i;
          await this._runStep(timeline[i]);
        }
      } finally {
        this.isPlaying = false;
        EventBus.emit('scene:complete', { sceneId: this.scene.id });
      }
    }
    pause() { this.isPaused = true; EventBus.emit('scene:pause', { sceneId: this.scene?.id }); }
    resume() { this.isPaused = false; EventBus.emit('scene:resume', { sceneId: this.scene?.id }); }
    stop() { this.isPlaying = false; this.isPaused = false; EventBus.emit('scene:stop', { sceneId: this.scene?.id }); }
    reset() { this.stop(); this.currentStepIndex = 0; if (this.scene) this.load(this.scene); }
    destroy() { this.stop(); this.entities.clear(); if (this.stage) { this.stage.destroy(); this.stage = null; } }
    async _runStep(step) {
      if (!this.isPlaying) return;
      if (step.par) { await Promise.all(step.par.map(s => this._runStep(s))); return; }
      const action = step.do;
      if (!action) return;
      const fn = this.skills.get(action);
      if (!fn) { console.warn(`Unknown skill: ${action}`); return; }
      await fn(this._ctx(), step);
    }
    _ctx() {
      const self = this;
      const speedMult = this.speedMultiplier;
      return {
        stage: this.stage, entities: this.entities, adapters: this.adapters, player: this,
        entity: (id) => this.entities.get(id),
        wait: (seconds) => sleep((seconds ?? 0) * 1000 / speedMult),
        tween: (opts) => tween({ ...opts, duration: (opts.duration || 0.5) / speedMult }),
        getActor: (id) => { const a = this.entities.get(id); if (!(a instanceof StickActor)) throw new Error(`Entity "${id}" is not a stickActor`); return a; },
        runSkill: async (skillName, step) => { const fn = self.skills.get(skillName); if (fn) await fn(self._ctx(), step); }
      };
    }
    _registerCoreSkills() {
      this.registerSkill("fadeIn", async (ctx, step) => { const dur = step.args?.duration ?? 0.4; ctx.stage.fade.style.opacity = "1"; await ctx.tween({ duration: dur, onUpdate: (e) => ctx.stage.fade.style.opacity = String(1 - e) }); ctx.stage.fade.style.opacity = "0"; });
      this.registerSkill("fadeOut", async (ctx, step) => { const dur = step.args?.duration ?? 0.4; ctx.stage.fade.style.opacity = "0"; await ctx.tween({ duration: dur, onUpdate: (e) => ctx.stage.fade.style.opacity = String(e) }); ctx.stage.fade.style.opacity = "1"; });
      this.registerSkill("wait", async (ctx, step) => { await ctx.wait(step.args?.duration ?? 1); });
      this.registerSkill("moveTo", async (ctx, step) => { const id = step.target; const a = ctx.getActor(id); const { x, y, duration = 0.8 } = step.args ?? {}; const x0 = a.x, y0 = a.y; const targetX = x ?? x0; const targetY = y ?? y0; await ctx.tween({ duration, onUpdate: (e) => { a.x = x0 + (targetX - x0) * e; a.y = y0 + (targetY - y0) * e; a.render(); } }); });
      this.registerSkill("setHead", async (ctx, step) => { ctx.getActor(step.target).setHead(step.args?.emoji ?? "🙂"); });
      this.registerSkill("pose", async (ctx, step) => {
        const a = ctx.getActor(step.target);
        const dur = step.args?.duration ?? 0.3;
        const name = step.args?.name;
        const presets = { neutral: { shoulderL: -30, elbowL: -20, shoulderR: 30, elbowR: 20 }, shrug: { shoulderL: -75, elbowL: 10, shoulderR: 75, elbowR: -10 }, wave: { shoulderR: -70, elbowR: -40 }, think: { shoulderR: -120, elbowR: -90 }, point: { shoulderR: -10, elbowR: 0 }, handsUp: { shoulderL: -150, elbowL: -30, shoulderR: 150, elbowR: 30 }, crossed: { shoulderL: 30, elbowL: 60, shoulderR: -30, elbowR: -60 }, pointLeft: { shoulderL: -170, elbowL: 0, shoulderR: 30, elbowR: 20 }, pointRight: { shoulderL: -30, elbowL: -20, shoulderR: 10, elbowR: 0 }, pointUp: { shoulderL: -30, elbowL: -20, shoulderR: -90, elbowR: 0 }, presentLeft: { shoulderL: -150, elbowL: -20, shoulderR: 30, elbowR: 20 }, presentRight: { shoulderL: -30, elbowL: -20, shoulderR: -30, elbowR: 20 }, presentBoth: { shoulderL: -150, elbowL: -20, shoulderR: -30, elbowR: 20 }, handsDown: { shoulderL: 60, elbowL: 20, shoulderR: 120, elbowR: -20 }, welcome: { shoulderL: -120, elbowL: -10, shoulderR: -60, elbowR: 10 } };
        const headDir = step.args?.headDirection !== undefined ? { headDirection: step.args.headDirection } : {};
        const targetPose = { ...a.pose, ...(name ? (presets[name] ?? {}) : {}), ...(step.args?.angles ?? {}), ...headDir };
        const startPose = { ...a.pose };
        await ctx.tween({ duration: dur, onUpdate: (e) => { const p = {}; for (const k of Object.keys(targetPose)) { p[k] = startPose[k] + (targetPose[k] - startPose[k]) * e; } a.setPose(p); } });
      });
      this.registerSkill("bubbleSay", async (ctx, step) => {
        const a = ctx.getActor(step.target);
        const text = step.args?.text ?? "";
        const hold = step.args?.hold ?? Math.max(1.5, Math.min(4, text.length / 15));
        const b = el("div", { className: "ssp-bubble" });
        b.textContent = text;
        ctx.stage.overlay.appendChild(b);
        const { x, y } = a.getAnchorScreenPoint();
        b.style.left = Math.round(x - 60) + "px"; b.style.top = Math.round(y - 90) + "px";
        b.style.opacity = "0"; b.style.transform = "translateY(10px)";
        await ctx.tween({ duration: 0.15, onUpdate: (e) => { b.style.opacity = String(e); b.style.transform = `translateY(${10 * (1 - e)}px)`; } });
        await ctx.wait(hold);
        await ctx.tween({ duration: 0.15, onUpdate: (e) => { b.style.opacity = String(1 - e); b.style.transform = `translateY(${-10 * e}px)`; } });
        b.remove();
      });
      this.registerSkill("chatSay", async (ctx, step) => {
        const speaker = step.args?.speaker ?? "Narrator";
        const text = step.args?.text ?? "";
        const targetId = step.target ?? step.args?.target ?? "chat";
        const panel = ctx.entity(targetId);
        if (!panel || panel.kind !== "chatPanel") return;
        const row = el("div", { className: "row" }, [ el("span", { className: "who", textContent: speaker + ":" }), el("span", { className: "msg", textContent: " " + text }) ]);
        panel.el.appendChild(row);
        panel.el.scrollTop = panel.el.scrollHeight;
        await ctx.wait(step.args?.pause ?? 0.3);
      });
      this.registerSkill("typeCode", async (ctx, step) => {
        const targetId = step.target ?? step.args?.target ?? "code";
        const editor = ctx.entity(targetId);
        if (!editor || editor.kind !== "codeEditor") return;
        const text = step.args?.text ?? "";
        const speedCps = step.args?.speedCps ?? 18;
        const append = step.args?.append ?? true;
        if (!append) { editor.text = ""; }
        const cursor = el("span", { className: "ssp-cursor", textContent: " " });
        editor.el.textContent = editor.text;
        editor.el.appendChild(cursor);
        for (let i = 0; i < text.length; i++) { editor.text += text[i]; editor.el.textContent = editor.text; editor.el.appendChild(cursor); await sleep(1000 / speedCps); }
        await ctx.wait(step.args?.cursorHold ?? 0.5);
        cursor.remove();
      });
      this.registerSkill("clearCode", async (ctx, step) => { const targetId = step.target ?? step.args?.target ?? "code"; const editor = ctx.entity(targetId); if (editor && editor.kind === "codeEditor") { editor.text = ""; editor.el.textContent = ""; } });
      this.registerSkill("setTitle", async (ctx, step) => { const targetId = step.target ?? step.args?.target ?? "title"; const title = ctx.entity(targetId); if (title && title.kind === "title") { title.el.textContent = step.args?.text ?? ""; } });
      this.registerSkill("writeBoard", async (ctx, step) => {
        const targetId = step.target ?? step.args?.target ?? "board";
        const board = ctx.entity(targetId);
        if (!board || board.kind !== "whiteboard") return;
        const text = step.args?.text ?? "";
        const speedCps = step.args?.speedCps ?? 12;
        const append = step.args?.append ?? true;
        if (!append) { board.text = ""; }
        board.el.textContent = board.text;
        for (let i = 0; i < text.length; i++) { board.text += text[i]; board.el.textContent = board.text; await sleep(1000 / speedCps); }
        await ctx.wait(step.args?.hold ?? 0.3);
      });
      this.registerSkill("clearBoard", async (ctx, step) => { const targetId = step.target ?? step.args?.target ?? "board"; const board = ctx.entity(targetId); if (board && board.kind === "whiteboard") { board.text = ""; board.el.textContent = ""; } });
      this.registerSkill("eraseLines", async (ctx, step) => {
        const targetId = step.target ?? step.args?.target ?? "board";
        const board = ctx.entity(targetId);
        if (!board || board.kind !== "whiteboard") return;
        const linesToErase = step.args?.lines ?? 1;
        const speedCps = step.args?.speedCps ?? 20;
        const lines = board.text.split('\n');
        let erasedCount = 0;
        while (erasedCount < linesToErase && lines.length > 0) {
          let lastLine = lines[lines.length - 1];
          while (lastLine.length > 0) { lastLine = lastLine.slice(0, -1); lines[lines.length - 1] = lastLine; board.text = lines.join('\n'); board.el.textContent = board.text; await sleep(1000 / speedCps); }
          lines.pop(); board.text = lines.join('\n'); board.el.textContent = board.text; erasedCount++;
          if (erasedCount < linesToErase && lines.length > 0) { await sleep(100); }
        }
        await ctx.wait(step.args?.hold ?? 0.2);
      });
      this.registerSkill("crossOut", async (ctx, step) => {
        const targetId = step.target ?? step.args?.target ?? "board";
        const board = ctx.entity(targetId);
        if (!board || board.kind !== "whiteboard") return;
        const textToFind = step.args?.text ?? "";
        const duration = step.args?.duration ?? 1;
        if (!textToFind) return;
        const startIndex = board.text.indexOf(textToFind);
        if (startIndex === -1) return;
        const delayPerChar = (duration * 1000) / textToFind.length;
        const beforeText = board.text.slice(0, startIndex);
        const afterText = board.text.slice(startIndex + textToFind.length);
        for (let i = 1; i <= textToFind.length; i++) {
          const crossedPart = textToFind.slice(0, i).split('').map(c => c + '\u0336').join('');
          const remainingPart = textToFind.slice(i);
          board.el.textContent = beforeText + crossedPart + remainingPart + afterText;
          await sleep(delayPerChar);
        }
        const fullyCrossed = textToFind.split('').map(c => c + '\u0336').join('');
        board.text = beforeText + fullyCrossed + afterText;
        await ctx.wait(step.args?.hold ?? 0.3);
      });
    }
  }

  return {
    Player, StickActor, SceneStage, tween, sleep, el, svgEl, easeOutCubic, easeInOutCubic,
    create({ mount, adapters = {} }) { return new Player({ mount, adapters }); }
  };
})();


// ============================================================================
// ADVENTURE PLAYER (simplified for standalone)
// ============================================================================


const AdventurePlayer = (() => {
  let currentAdventure = null;
  let currentPath = [];  // Path through the nested structure
  let history = [];
  let scenePlayer = null;
  let isPlaying = false;
  let speedMultiplier = 1;
  let endTitle, lessonsList;

  let stageEl, choiceOverlay, choicePrompt, choiceOptions, endOverlay, endSummary, stepCounterEl, pauseBtnEl, speedSelectEl, restartBtnEl;

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  function init() {
    stageEl = document.getElementById('adventure-stage');
    choiceOverlay = document.getElementById('choice-overlay');
    choicePrompt = document.getElementById('choice-prompt');
    choiceOptions = document.getElementById('choice-options');
    endOverlay = document.getElementById('end-overlay');
    endSummary = document.getElementById('end-summary');
    endTitle = document.getElementById('end-title');
    lessonsList = document.getElementById('lessons-list');
    stepCounterEl = document.getElementById('step-counter');
    pauseBtnEl = document.getElementById('btn-pause');
    speedSelectEl = document.getElementById('speed-select');
    restartBtnEl = document.getElementById('btn-restart');

    // Settings popup toggle
    const settingsBtn = document.getElementById('settings-btn');
    const settingsPopup = document.getElementById('settings-popup');
    const restartSettingsBtn = document.getElementById('btn-restart-settings');

    settingsBtn?.addEventListener('click', (e) => {
      e.stopPropagation();
      settingsPopup?.classList.toggle('show');
    });

    // Close popup when clicking outside
    document.addEventListener('click', (e) => {
      if (settingsPopup?.classList.contains('show') && !settingsPopup.contains(e.target) && e.target !== settingsBtn) {
        settingsPopup.classList.remove('show');
      }
    });

    speedSelectEl?.addEventListener('change', (e) => {
      setSpeed(parseFloat(e.target.value));
    });

    pauseBtnEl?.addEventListener('click', () => {
      if (scenePlayer) {
        if (scenePlayer.isPaused) { resume(); pauseBtnEl.textContent = '▶️ Play'; }
        else { pause(); pauseBtnEl.textContent = '⏸ Pause'; }
      }
    });

    restartBtnEl?.addEventListener('click', restart);
    restartSettingsBtn?.addEventListener('click', () => {
      settingsPopup?.classList.remove('show');
      restart();
    });

    EventBus.on('scene:complete', handleSceneComplete);
  }

  async function play(adventureId) {
    currentAdventure = AdventureManager.getAdventure(adventureId);
    if (!currentAdventure) return;
    isPlaying = true;
    history = [];
    currentPath = [];
    hideAllOverlays();

    // Start with the scenes array
    if (currentAdventure.scenes && currentAdventure.scenes.length > 0) {
      await playItemsSequence(currentAdventure.scenes);
    }

    EventBus.emit('adventure:start', { adventureId, adventure: currentAdventure });
  }

  // Play a sequence of items (scenes array or choice branch scenes)
  async function playItemsSequence(items) {
    for (let i = 0; i < items.length; i++) {
      if (!isPlaying) return;
      const item = items[i];
      history.push({ type: item.type || 'scene', index: i });
      updateProgress();

      const result = await playItem(item);

      // If item returned a branch to follow (from a choice), play that branch
      if (result && result.branchScenes) {
        await playItemsSequence(result.branchScenes);
        return; // After branch completes, don't continue original sequence
      }
    }
  }

  // Play a single item, returns result indicating what to do next
  async function playItem(item) {
    if (!item) return null;

    // String reference (just a scene ID)
    if (typeof item === 'string') {
      await playSceneById(item);
      return null;
    }

    const type = item.type || 'scene';

    switch (type) {
      case 'scene':
        const sceneId = item.sceneRef || item.sceneId || '';
        if (sceneId) await playSceneById(sceneId);
        return null;

      case 'choice':
        return await showChoiceAndWait(item);

      case 'end':
        showEndNode(item);
        return { ended: true };

      default:
        return null;
    }
  }

  async function playSceneById(sceneId) {
    hideAllOverlays();
    const scene = SceneManager.getScene(sceneId);
    if (!scene) {
      await sleep(500);
      return;
    }
    if (scenePlayer) scenePlayer.destroy();
    scenePlayer = StickScenePlayer.create({ mount: stageEl });
    scenePlayer.setSpeed(speedMultiplier);
    await scenePlayer.load(scene);
    if (pauseBtnEl) pauseBtnEl.textContent = '⏸';

    // Wait for scene to complete
    await new Promise((resolve) => {
      const unsub = EventBus.on('scene:complete', ({ sceneId: completedId }) => {
        if (completedId === scene.id) {
          unsub();
          resolve();
        }
      });
      scenePlayer.play();
    });

    await sleep(300); // Brief pause between scenes
  }

  function handleSceneComplete({ sceneId }) {
    // Handled via promise in playSceneById
  }

  // Show choice and wait for user selection, returns the selected branch
  async function showChoiceAndWait(choiceItem) {
    return new Promise((resolve) => {
      if (stageEl) stageEl.style.display = 'none';
      if (choiceOverlay) choiceOverlay.style.display = 'flex';
      if (choicePrompt) choicePrompt.textContent = choiceItem.prompt || 'What would you like to do?';

      if (choiceOptions) {
        choiceOptions.innerHTML = '';
        const choices = choiceItem.choices || [];

        for (const choice of choices) {
          const btn = document.createElement('button');
          btn.className = 'choice-option-btn';
          btn.innerHTML = `<span class="choice-icon">${choice.icon || ''}</span><span class="choice-label">${choice.name || 'Choice'}</span>${choice.description ? `<span class="choice-desc">${choice.description}</span>` : ''}`;
          btn.addEventListener('click', () => {
            hideAllOverlays();
            if (stageEl) stageEl.style.display = 'flex';
            // Return the scenes from this choice branch
            resolve({ branchScenes: choice.scenes || [] });
          });
          choiceOptions.appendChild(btn);
        }
      }

      EventBus.emit('adventure:choice', { item: choiceItem });
    });
  }

  function showEndNode(node) {
    isPlaying = false;
    if (scenePlayer) { scenePlayer.destroy(); scenePlayer = null; }
    if (stageEl) stageEl.style.display = 'none';
    if (endOverlay) endOverlay.style.display = 'flex';
    if (endTitle) endTitle.textContent = node.title || 'Adventure Complete';
    if (endSummary) endSummary.textContent = node.summary || 'Adventure complete!';
    if (lessonsList && node.lessons && node.lessons.length > 0) {
      lessonsList.innerHTML = '';
      node.lessons.forEach(lesson => {
        const li = document.createElement('li');
        li.textContent = lesson;
        lessonsList.appendChild(li);
      });
      lessonsList.style.display = 'block';
    } else if (lessonsList) {
      lessonsList.style.display = 'none';
    }
    EventBus.emit('adventure:complete', { adventureId: currentAdventure?.id, path: history });
  }

  function hideAllOverlays() {
    if (choiceOverlay) choiceOverlay.style.display = 'none';
    if (endOverlay) endOverlay.style.display = 'none';
    if (stageEl) stageEl.style.display = 'flex';
  }

  function updateProgress() {
    if (stepCounterEl && currentAdventure) {
      stepCounterEl.textContent = `Step ${history.length}`;
    }
  }

  async function restart() { if (currentAdventure) await play(currentAdventure.id); }
  function stop() { isPlaying = false; if (scenePlayer) { scenePlayer.stop(); scenePlayer.destroy(); scenePlayer = null; } hideAllOverlays(); history = []; currentPath = []; }
  function setSpeed(multiplier) { speedMultiplier = Math.max(0.1, Math.min(10, multiplier)); if (scenePlayer) scenePlayer.setSpeed(speedMultiplier); }
  function pause() { if (scenePlayer) scenePlayer.pause(); }
  function resume() { if (scenePlayer) scenePlayer.resume(); }

  return { init, play, restart, stop, pause, resume, setSpeed, get isPlaying() { return isPlaying; } };
})();


// ============================================================================
// INITIALIZATION
// ============================================================================

document.addEventListener('DOMContentLoaded', () => {
  AdventurePlayer.init();
  AdventurePlayer.play(ADVENTURE.id);
});

  </script>
