<svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#E0F4FF"/>
    </linearGradient>
    <linearGradient id="hill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7CCD7C"/>
      <stop offset="100%" stop-color="#228B22"/>
    </linearGradient>
    <linearGradient id="skin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFDAB9"/>
      <stop offset="100%" stop-color="#E8B896"/>
    </linearGradient>

    <style>
      /* Boy crying wolf animations */
      @keyframes armWave {
        0%, 100% { transform: rotate(-20deg); }
        50% { transform: rotate(20deg); }
      }
      @keyframes jumpUp {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-15px); }
      }
      @keyframes mouthShout {
        0%, 100% { transform: scaleY(1); }
        25%, 75% { transform: scaleY(1.5); }
      }

      /* Villagers running */
      @keyframes runLeft {
        0% { transform: translateX(200px); }
        100% { transform: translateX(0); }
      }
      @keyframes runRight {
        0% { transform: translateX(-200px); }
        100% { transform: translateX(0); }
      }
      @keyframes legRun {
        0%, 100% { transform: rotate(-25deg); }
        50% { transform: rotate(25deg); }
      }
      @keyframes armRun {
        0%, 100% { transform: rotate(30deg); }
        50% { transform: rotate(-30deg); }
      }
      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }

      /* Scared sheep */
      @keyframes sheepScatter {
        0%, 100% { transform: translateX(0) rotate(0deg); }
        25% { transform: translateX(-10px) rotate(-5deg); }
        75% { transform: translateX(10px) rotate(5deg); }
      }

      .boy-shouting { animation: jumpUp 0.5s ease-in-out infinite; }
      /* Arms rotate around origin (0,0) which is the shoulder joint */
      .boy-arm-left { animation: armWave 0.4s ease-in-out infinite; transform-origin: 0 0; }
      .boy-arm-right { animation: armWave 0.4s ease-in-out infinite 0.2s; transform-origin: 0 0; }
      /* Mouth scales around its center at origin */
      .boy-mouth { animation: mouthShout 0.3s ease-in-out infinite; transform-origin: 0 0; }

      .villager-1 { animation: runRight 3s ease-out forwards, bounce 0.3s ease-in-out infinite; }
      .villager-2 { animation: runLeft 3.5s ease-out forwards, bounce 0.35s ease-in-out infinite 0.1s; }
      /* Legs/arms rotate around origin (0,0) which is the hip/shoulder joint */
      .villager-leg { animation: legRun 0.25s ease-in-out infinite; transform-origin: 0 0; }
      .villager-arm { animation: armRun 0.25s ease-in-out infinite; transform-origin: 0 0; }

      .sheep-scared { animation: sheepScatter 0.5s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Sky -->
  <rect width="960" height="540" fill="url(#sky)"/>

  <!-- Sun -->
  <circle cx="820" cy="80" r="50" fill="#FFD700" opacity="0.9"/>

  <!-- Distant hills -->
  <ellipse cx="200" cy="350" rx="300" ry="120" fill="#6B8E6B"/>
  <ellipse cx="700" cy="360" rx="350" ry="100" fill="#5F9F5F"/>

  <!-- Main hillside -->
  <ellipse cx="480" cy="600" rx="600" ry="280" fill="url(#hill)"/>

  <!-- Scared sheep running around -->
  <!-- FIX: Position wrapper (outer) + Animation wrapper (inner) -->
  <g transform="translate(650, 420)">
    <g class="sheep-scared">
      <ellipse cx="0" cy="0" rx="35" ry="24" fill="#FFF"/>
      <ellipse cx="32" cy="3" rx="15" ry="11" fill="#333"/>
      <circle cx="38" cy="0" r="3" fill="white"/>
      <rect x="-18" y="15" width="7" height="20" rx="2" fill="#333"/>
      <rect x="-5" y="15" width="7" height="20" rx="2" fill="#333"/>
      <rect x="8" y="15" width="7" height="20" rx="2" fill="#333"/>
      <rect x="18" y="15" width="7" height="20" rx="2" fill="#333"/>
    </g>
  </g>

  <g transform="translate(750, 400)">
    <g class="sheep-scared" style="animation-delay: 0.2s;">
      <ellipse cx="0" cy="0" rx="30" ry="20" fill="#FFF"/>
      <ellipse cx="-28" cy="2" rx="13" ry="10" fill="#333"/>
      <rect x="-15" y="12" width="6" height="18" rx="2" fill="#333"/>
      <rect x="-3" y="12" width="6" height="18" rx="2" fill="#333"/>
      <rect x="8" y="12" width="6" height="18" rx="2" fill="#333"/>
    </g>
  </g>

  <!-- VILLAGER 1 - Farmer with pitchfork running from left -->
  <!-- FIX: Position wrapper (outer) + Animation wrapper (inner) -->
  <g transform="translate(180, 380)">
    <g class="villager-1">
    <!-- Pitchfork -->
    <g transform="rotate(-30)">
      <rect x="50" y="-80" width="5" height="100" fill="#8B4513"/>
      <path d="M45,-80 L45,-95 M52,-80 L52,-95 M59,-80 L59,-95" stroke="#555" stroke-width="3"/>
    </g>

    <!-- Body -->
    <rect x="-18" y="10" width="36" height="45" rx="6" fill="#8B4513"/>

    <!-- Legs running - hip joints positioned, legs drawn from origin -->
    <!-- Left leg: hip at (-9, 55) -->
    <g transform="translate(-9, 55)">
      <g class="villager-leg">
        <rect x="-6" y="0" width="12" height="40" rx="4" fill="#4A4A6A"/>
      </g>
    </g>
    <!-- Right leg: hip at (9, 55) -->
    <g transform="translate(9, 55)">
      <g class="villager-leg" style="animation-delay: 0.125s;">
        <rect x="-6" y="0" width="12" height="40" rx="4" fill="#4A4A6A"/>
      </g>
    </g>

    <!-- Arms running - shoulder joints positioned, arms drawn from origin -->
    <!-- Left arm: shoulder at (-18, 15) -->
    <g transform="translate(-18, 15)">
      <g class="villager-arm">
        <rect x="-7" y="0" width="14" height="35" rx="5" fill="url(#skin)"/>
      </g>
    </g>
    <!-- Right arm: shoulder at (18, 15) -->
    <g transform="translate(18, 15)">
      <g class="villager-arm" style="animation-delay: 0.125s;">
        <rect x="-7" y="0" width="14" height="35" rx="5" fill="url(#skin)"/>
      </g>
    </g>

    <!-- Head -->
    <ellipse cx="0" cy="-10" rx="22" ry="25" fill="url(#skin)"/>
    <!-- Straw hat -->
    <ellipse cx="0" cy="-30" rx="28" ry="8" fill="#DAA520"/>
    <ellipse cx="0" cy="-35" rx="18" ry="12" fill="#DAA520"/>
    <!-- Worried face -->
    <circle cx="-8" cy="-12" r="4" fill="white"/>
    <circle cx="8" cy="-12" r="4" fill="white"/>
    <circle cx="-8" cy="-11" r="2" fill="#333"/>
    <circle cx="8" cy="-11" r="2" fill="#333"/>
    <ellipse cx="0" cy="2" rx="8" ry="5" fill="#8B0000"/>
    <path d="M-12,-22 Q-8,-18 -4,-22" stroke="#5D4037" stroke-width="2" fill="none"/>
    <path d="M4,-22 Q8,-18 12,-22" stroke="#5D4037" stroke-width="2" fill="none"/>
    </g>
  </g>

  <!-- VILLAGER 2 - Baker running from right -->
  <g transform="translate(780, 390)">
    <g class="villager-2">
    <!-- Rolling pin -->
    <rect x="-60" y="20" width="50" height="8" rx="4" fill="#DEB887" transform="rotate(-20)"/>

    <!-- Body - white apron -->
    <rect x="-16" y="10" width="32" height="42" rx="5" fill="white"/>
    <rect x="-20" y="8" width="40" height="20" rx="4" fill="#4169E1"/>

    <!-- Legs - hip joints positioned, legs drawn from origin -->
    <!-- Left leg: hip at (-8, 50) -->
    <g transform="translate(-8, 50)">
      <g class="villager-leg">
        <rect x="-5" y="0" width="11" height="38" rx="4" fill="#333"/>
      </g>
    </g>
    <!-- Right leg: hip at (8, 50) -->
    <g transform="translate(8, 50)">
      <g class="villager-leg" style="animation-delay: 0.125s;">
        <rect x="-5" y="0" width="11" height="38" rx="4" fill="#333"/>
      </g>
    </g>

    <!-- Arms - shoulder joints positioned, arms drawn from origin -->
    <!-- Left arm: shoulder at (-16, 12) -->
    <g transform="translate(-16, 12)">
      <g class="villager-arm">
        <rect x="-6" y="0" width="12" height="32" rx="4" fill="url(#skin)"/>
      </g>
    </g>
    <!-- Right arm: shoulder at (16, 12) -->
    <g transform="translate(16, 12)">
      <g class="villager-arm" style="animation-delay: 0.125s;">
        <rect x="-6" y="0" width="12" height="32" rx="4" fill="url(#skin)"/>
      </g>
    </g>

    <!-- Head -->
    <ellipse cx="0" cy="-8" rx="20" ry="22" fill="url(#skin)"/>
    <!-- Chef hat -->
    <rect x="-15" cy="-32" width="30" height="25" rx="3" fill="white"/>
    <ellipse cx="0" cy="-30" rx="18" ry="6" fill="white"/>
    <!-- Worried face -->
    <circle cx="-7" cy="-10" r="3.5" fill="white"/>
    <circle cx="7" cy="-10" r="3.5" fill="white"/>
    <circle cx="-7" cy="-9" r="1.5" fill="#333"/>
    <circle cx="7" cy="-9" r="1.5" fill="#333"/>
    <ellipse cx="0" cy="4" rx="7" ry="4" fill="#8B0000"/>
    </g>
  </g>

  <!-- SHEPHERD BOY - center, arms up shouting -->
  <g transform="translate(480, 300)">
    <g class="boy-shouting">
    <!-- Crook dropped on ground -->
    <path d="M100,100 L150,120" stroke="#8B4513" stroke-width="6" stroke-linecap="round"/>
    <path d="M100,100 Q100,70 80,70 Q60,70 60,90" stroke="#8B4513" stroke-width="6" fill="none" stroke-linecap="round"/>

    <!-- Legs -->
    <rect x="-15" y="70" width="14" height="50" rx="5" fill="#4A4A8A"/>
    <rect x="1" y="70" width="14" height="50" rx="5" fill="#4A4A8A"/>
    <ellipse cx="-8" cy="122" rx="10" ry="6" fill="#5D4037"/>
    <ellipse cx="8" cy="122" rx="10" ry="6" fill="#5D4037"/>

    <!-- Torso -->
    <rect x="-22" y="20" width="44" height="55" rx="8" fill="#E67E22"/>

    <!-- Arms raised up - THREE wrappers: position, base rotation, animation -->
    <!-- Left arm: shoulder at (-22, 25) relative to character -->
    <g transform="translate(-22, 25)">
      <!-- Base position: arm raised up (-60 degrees from down) -->
      <g transform="rotate(-60)">
        <!-- Animation wrapper: small wave oscillation -->
        <g class="boy-arm-left">
          <rect x="-7" y="0" width="15" height="45" rx="5" fill="url(#skin)"/>
          <circle cx="0" cy="50" r="8" fill="url(#skin)"/>
        </g>
      </g>
    </g>
    <!-- Right arm: shoulder at (22, 25) relative to character -->
    <g transform="translate(22, 25)">
      <!-- Base position: arm raised up (60 degrees from down) -->
      <g transform="rotate(60)">
        <!-- Animation wrapper: small wave oscillation -->
        <g class="boy-arm-right">
          <rect x="-8" y="0" width="15" height="45" rx="5" fill="url(#skin)"/>
          <circle cx="0" cy="50" r="8" fill="url(#skin)"/>
        </g>
      </g>
    </g>

    <!-- Head -->
    <rect x="-8" y="5" width="16" height="18" fill="url(#skin)"/>
    <ellipse cx="0" cy="-15" rx="28" ry="32" fill="url(#skin)"/>

    <!-- Hair -->
    <ellipse cx="0" cy="-35" rx="26" ry="18" fill="#5D4037"/>
    <ellipse cx="-20" cy="-25" rx="10" ry="15" fill="#5D4037"/>
    <ellipse cx="20" cy="-25" rx="10" ry="15" fill="#5D4037"/>

    <!-- Excited/mischievous eyes -->
    <ellipse cx="-10" cy="-18" rx="7" ry="6" fill="white"/>
    <ellipse cx="10" cy="-18" rx="7" ry="6" fill="white"/>
    <circle cx="-9" cy="-17" r="3.5" fill="#333"/>
    <circle cx="11" cy="-17" r="3.5" fill="#333"/>
    <circle cx="-10" cy="-19" r="1" fill="white"/>
    <circle cx="10" cy="-19" r="1" fill="white"/>

    <!-- Raised eyebrows -->
    <path d="M-17,-28 Q-10,-32 -3,-28" stroke="#5D4037" stroke-width="2.5" fill="none"/>
    <path d="M3,-28 Q10,-32 17,-28" stroke="#5D4037" stroke-width="2.5" fill="none"/>

    <!-- Nose -->
    <ellipse cx="0" cy="-8" rx="4" ry="5" fill="#E8A878"/>

    <!-- Open mouth shouting - position wrapper at mouth center, mouth at origin -->
    <g transform="translate(0, 5)">
      <g class="boy-mouth">
        <ellipse cx="0" cy="0" rx="12" ry="10" fill="#8B0000"/>
        <ellipse cx="0" cy="-5" rx="10" ry="4" fill="white"/>
        <path d="M-8,5 Q0,9 8,5" fill="#CC4444"/>
      </g>
    </g>

    <!-- Cheeks flushed -->
    <circle cx="-20" cy="-5" r="8" fill="#FF6B6B" opacity="0.6"/>
    <circle cx="20" cy="-5" r="8" fill="#FF6B6B" opacity="0.6"/>
    </g>
  </g>

  <!-- Speech bubble -->
  <g transform="translate(480, 120)">
    <ellipse cx="0" cy="0" rx="120" ry="50" fill="white" stroke="#333" stroke-width="3"/>
    <polygon points="0,45 -20,80 20,50" fill="white" stroke="#333" stroke-width="3"/>
    <polygon points="0,45 -18,75 18,48" fill="white"/>
    <text x="0" y="-5" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="28" font-weight="bold" fill="#D32F2F">WOLF!</text>
    <text x="0" y="25" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="28" font-weight="bold" fill="#D32F2F">WOLF!</text>
  </g>
</svg>
