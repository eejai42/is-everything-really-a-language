<svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="duskSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4A3F55"/>
      <stop offset="40%" stop-color="#8B6B8C"/>
      <stop offset="100%" stop-color="#D4A574"/>
    </linearGradient>
    <linearGradient id="darkHill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3D5C3D"/>
      <stop offset="100%" stop-color="#1A3A1A"/>
    </linearGradient>
    <linearGradient id="wolfFur" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5A5A5A"/>
      <stop offset="100%" stop-color="#3A3A3A"/>
    </linearGradient>
    <linearGradient id="skin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFDAB9"/>
      <stop offset="100%" stop-color="#E8B896"/>
    </linearGradient>

    <filter id="eyeGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      /* Wolf animations - menacing */
      @keyframes wolfStalk {
        0%, 100% { transform: translateX(0); }
        50% { transform: translateX(10px); }
      }
      @keyframes wolfBreath {
        0%, 100% { transform: scaleX(1); }
        50% { transform: scaleX(1.03); }
      }
      @keyframes eyePulse {
        0%, 100% { fill: #FFD700; filter: url(#eyeGlow); }
        50% { fill: #FF4500; }
      }
      @keyframes jawSnap {
        0%, 80%, 100% { transform: rotate(0deg); }
        85%, 95% { transform: rotate(10deg); }
      }
      @keyframes tailThreat {
        0%, 100% { transform: rotate(0deg); }
        30% { transform: rotate(-10deg); }
        70% { transform: rotate(10deg); }
      }

      /* Boy terrified animations */
      @keyframes boyShake {
        0%, 100% { transform: translateX(0) rotate(0deg); }
        25% { transform: translateX(-5px) rotate(-2deg); }
        75% { transform: translateX(5px) rotate(2deg); }
      }
      @keyframes armsUp {
        0%, 100% { transform: rotate(-5deg); }
        50% { transform: rotate(5deg); }
      }
      @keyframes kneesKnock {
        0%, 100% { transform: rotate(-3deg); }
        50% { transform: rotate(3deg); }
      }

      /* Sheep fleeing */
      @keyframes sheepFlee {
        0% { transform: translateX(0) scale(1); }
        100% { transform: translateX(-150px) scale(0.6); }
      }

      .wolf { animation: wolfStalk 2s ease-in-out infinite; }
      .wolf-body { animation: wolfBreath 1.5s ease-in-out infinite; }
      .wolf-eye { animation: eyePulse 1s ease-in-out infinite; }
      .wolf-jaw { animation: jawSnap 3s ease-in-out infinite; transform-origin: right center; }
      .wolf-tail { animation: tailThreat 1.5s ease-in-out infinite; transform-origin: left center; }

      .boy-scared { animation: boyShake 0.2s ease-in-out infinite; }
      /* Limbs rotate around origin (0,0) which is the joint */
      .boy-arm-scared { animation: armsUp 0.3s ease-in-out infinite; transform-origin: 0 0; }
      .boy-leg-scared { animation: kneesKnock 0.25s ease-in-out infinite; transform-origin: 0 0; }

      .sheep-run-1 { animation: sheepFlee 4s ease-in forwards; }
      .sheep-run-2 { animation: sheepFlee 4.5s ease-in forwards 0.3s; }
    </style>
  </defs>

  <!-- Dusk sky -->
  <rect width="960" height="540" fill="url(#duskSky)"/>

  <!-- Setting sun -->
  <circle cx="880" cy="200" r="60" fill="#FF6347" opacity="0.6"/>
  <circle cx="880" cy="200" r="80" fill="#FF6347" opacity="0.2"/>

  <!-- Dark hills -->
  <ellipse cx="200" cy="380" rx="350" ry="150" fill="#2D4A2D"/>
  <ellipse cx="750" cy="400" rx="400" ry="120" fill="#254025"/>
  <ellipse cx="480" cy="620" rx="650" ry="300" fill="url(#darkHill)"/>

  <!-- Fleeing sheep -->
  <!-- FIX: Position wrapper (outer) + Animation wrapper (inner) -->
  <g transform="translate(200, 420)">
    <g class="sheep-run-1">
      <ellipse cx="0" cy="0" rx="30" ry="20" fill="#EEE"/>
      <ellipse cx="28" cy="2" rx="12" ry="9" fill="#333"/>
      <rect x="-15" y="12" width="6" height="16" rx="2" fill="#333"/>
      <rect x="-3" y="12" width="6" height="16" rx="2" fill="#333"/>
      <rect x="8" y="12" width="6" height="16" rx="2" fill="#333"/>
    </g>
  </g>
  <g transform="translate(280, 400)">
    <g class="sheep-run-2">
      <ellipse cx="0" cy="0" rx="25" ry="17" fill="#EEE"/>
      <ellipse cx="23" cy="1" rx="10" ry="8" fill="#333"/>
      <rect x="-12" y="10" width="5" height="14" rx="2" fill="#333"/>
      <rect x="2" y="10" width="5" height="14" rx="2" fill="#333"/>
    </g>
  </g>

  <!-- THE WOLF - menacing -->
  <!-- FIX: Position wrapper (outer) + Animation wrapper (inner) -->
  <g transform="translate(650, 320)">
    <g class="wolf">
    <g class="wolf-body">
      <!-- Tail -->
      <g class="wolf-tail">
        <path d="M120,30 Q160,10 175,25 Q165,45 140,45 Q120,50 120,30" fill="url(#wolfFur)"/>
      </g>

      <!-- Back legs -->
      <rect x="90" y="55" width="18" height="50" rx="6" fill="url(#wolfFur)"/>
      <rect x="110" y="50" width="18" height="55" rx="6" fill="url(#wolfFur)"/>

      <!-- Body -->
      <ellipse cx="60" cy="35" rx="70" ry="40" fill="url(#wolfFur)"/>

      <!-- Front legs - crouched -->
      <rect x="-10" y="50" width="18" height="50" rx="6" fill="url(#wolfFur)"/>
      <rect x="10" y="45" width="18" height="55" rx="6" fill="url(#wolfFur)"/>

      <!-- Chest -->
      <ellipse cx="-5" cy="30" rx="35" ry="35" fill="url(#wolfFur)"/>

      <!-- Neck -->
      <path d="M-30,15 Q-50,0 -55,10 Q-60,20 -45,30 L-30,35" fill="url(#wolfFur)"/>

      <!-- Head -->
      <ellipse cx="-70" cy="5" rx="40" ry="30" fill="url(#wolfFur)"/>

      <!-- Snout -->
      <path d="M-100,10 Q-130,10 -135,15 Q-130,25 -100,20 Q-85,18 -85,10 Q-85,5 -100,10" fill="#4A4A4A"/>

      <!-- Nose -->
      <ellipse cx="-130" cy="15" rx="8" ry="6" fill="#1A1A1A"/>

      <!-- Jaw with teeth -->
      <g class="wolf-jaw">
        <path d="M-130,20 Q-110,35 -85,25" fill="#4A4A4A"/>
        <!-- Teeth -->
        <path d="M-120,22 L-118,30 L-114,22 L-110,28 L-106,22 L-102,26 L-98,22" fill="white" stroke="white" stroke-width="1"/>
      </g>

      <!-- Drool -->
      <path d="M-115,28 Q-117,38 -115,45" stroke="#AAA" stroke-width="2" fill="none" opacity="0.7"/>

      <!-- Eyes - glowing -->
      <g class="wolf-eye" filter="url(#eyeGlow)">
        <ellipse cx="-85" cy="-5" rx="10" ry="8" fill="#FFD700"/>
        <ellipse cx="-85" cy="-5" rx="4" ry="6" fill="#000"/>
      </g>
      <g class="wolf-eye" style="animation-delay: 0.1s;" filter="url(#eyeGlow)">
        <ellipse cx="-55" cy="-8" rx="9" ry="7" fill="#FFD700"/>
        <ellipse cx="-55" cy="-8" rx="3.5" ry="5.5" fill="#000"/>
      </g>

      <!-- Angry brow -->
      <path d="M-95,-12 Q-85,-18 -75,-12" stroke="#2A2A2A" stroke-width="4" fill="none"/>
      <path d="M-65,-15 Q-55,-20 -45,-15" stroke="#2A2A2A" stroke-width="4" fill="none"/>

      <!-- Ears - alert -->
      <path d="M-75,-20 L-85,-55 L-60,-30 Z" fill="url(#wolfFur)"/>
      <path d="M-45,-25 L-50,-60 L-30,-35 Z" fill="url(#wolfFur)"/>
      <path d="M-75,-25 L-82,-45 L-62,-32 Z" fill="#5A3A3A"/>
      <path d="M-47,-28 L-50,-50 L-35,-38 Z" fill="#5A3A3A"/>
    </g>
    </g>
  </g>

  <!-- SHEPHERD BOY - terrified -->
  <g transform="translate(200, 320)">
    <g class="boy-scared">
    <!-- Legs shaking - hip joints positioned, legs drawn from origin -->
    <!-- Left leg: hip at (-10, 70) -->
    <g transform="translate(-10, 70)">
      <g class="boy-leg-scared">
        <rect x="-7" y="0" width="15" height="50" rx="5" fill="#4A4A8A"/>
        <ellipse cx="0" cy="52" rx="10" ry="6" fill="#5D4037"/>
      </g>
    </g>
    <!-- Right leg: hip at (10, 70) -->
    <g transform="translate(10, 70)">
      <g class="boy-leg-scared" style="animation-delay: 0.1s;">
        <rect x="-7" y="0" width="15" height="50" rx="5" fill="#4A4A8A"/>
        <ellipse cx="0" cy="52" rx="10" ry="6" fill="#5D4037"/>
      </g>
    </g>

    <!-- Torso leaning back -->
    <rect x="-24" y="18" width="48" height="58" rx="8" fill="#E67E22" transform="rotate(-10)"/>

    <!-- Arms up in defense - THREE wrappers: position, base rotation, animation -->
    <!-- Left arm: shoulder at (-24, 20) -->
    <g transform="translate(-24, 20)">
      <!-- Base position: arm raised in defense (-70 degrees) -->
      <g transform="rotate(-70)">
        <!-- Animation wrapper: scared trembling -->
        <g class="boy-arm-scared">
          <rect x="-8" y="0" width="16" height="50" rx="5" fill="url(#skin)"/>
          <circle cx="0" cy="55" r="9" fill="url(#skin)"/>
        </g>
      </g>
    </g>
    <!-- Right arm: shoulder at (24, 20) -->
    <g transform="translate(24, 20)">
      <!-- Base position: arm raised in defense (70 degrees) -->
      <g transform="rotate(70)">
        <!-- Animation wrapper: scared trembling -->
        <g class="boy-arm-scared" style="animation-delay: 0.15s;">
          <rect x="-8" y="0" width="16" height="50" rx="5" fill="url(#skin)"/>
          <circle cx="0" cy="55" r="9" fill="url(#skin)"/>
        </g>
      </g>
    </g>

    <!-- Head -->
    <rect x="-8" y="2" width="16" height="20" fill="url(#skin)"/>
    <ellipse cx="0" cy="-18" rx="30" ry="35" fill="url(#skin)"/>

    <!-- Hair standing up -->
    <ellipse cx="0" cy="-42" rx="28" ry="20" fill="#5D4037"/>
    <path d="M-20,-55 L-15,-40 L-10,-58 L-5,-42 L0,-60 L5,-42 L10,-58 L15,-40 L20,-55" fill="#5D4037"/>

    <!-- Terrified eyes - wide -->
    <ellipse cx="-11" cy="-20" rx="10" ry="12" fill="white"/>
    <ellipse cx="11" cy="-20" rx="10" ry="12" fill="white"/>
    <circle cx="-11" cy="-18" r="5" fill="#333"/>
    <circle cx="11" cy="-18" r="5" fill="#333"/>
    <circle cx="-12" cy="-20" r="2" fill="white"/>
    <circle cx="10" cy="-20" r="2" fill="white"/>

    <!-- Raised terrified eyebrows -->
    <path d="M-22,-35 Q-11,-42 0,-35" stroke="#5D4037" stroke-width="3" fill="none"/>
    <path d="M0,-35 Q11,-42 22,-35" stroke="#5D4037" stroke-width="3" fill="none"/>

    <!-- Nose -->
    <ellipse cx="0" cy="-5" rx="4" ry="5" fill="#E8A878"/>

    <!-- Screaming mouth -->
    <ellipse cx="0" cy="10" rx="18" ry="15" fill="#000"/>
    <ellipse cx="0" cy="5" rx="15" ry="6" fill="white"/>
    <ellipse cx="0" cy="20" rx="10" ry="5" fill="#8B0000"/>

    <!-- Sweat drops -->
    <ellipse cx="-28" cy="-15" rx="4" ry="6" fill="#87CEEB"/>
    <ellipse cx="28" cy="-10" rx="4" ry="6" fill="#87CEEB"/>
    <ellipse cx="-25" cy="0" rx="3" ry="5" fill="#87CEEB"/>

    <!-- Pale face -->
    <ellipse cx="0" cy="-18" rx="28" ry="33" fill="#F5F5DC" opacity="0.3"/>
    </g>
  </g>

  <!-- Speech bubble - HELP! -->
  <g transform="translate(200, 160)">
    <ellipse cx="0" cy="0" rx="100" ry="50" fill="white" stroke="#D32F2F" stroke-width="4"/>
    <polygon points="20,45 40,90 50,50" fill="white" stroke="#D32F2F" stroke-width="4"/>
    <polygon points="22,45 38,85 48,48" fill="white"/>
    <text x="0" y="-8" text-anchor="middle" font-family="Impact, sans-serif" font-size="32" fill="#D32F2F">HELP!</text>
    <text x="0" y="25" text-anchor="middle" font-family="Impact, sans-serif" font-size="24" fill="#D32F2F">WOLF!</text>
  </g>

  <!-- Ominous text at bottom -->
  <text x="480" y="520" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#FFE4B5" font-style="italic">But no one came...</text>
</svg>
