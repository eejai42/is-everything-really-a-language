<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#58a6ff"/>
    </marker>

    <style>
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.85; }
        50% { opacity: 1; }
      }

      .node { animation: fadeIn 0.5s ease-out forwards, pulse 3s ease-in-out infinite 2s; }
      .edge { animation: fadeIn 0.4s ease-out forwards; }

      #title-text { animation-delay: 0.1s; opacity: 0; }
      #node-airtable { animation-delay: 0.3s; opacity: 0; }
      #node-rulebook { animation-delay: 0.5s; opacity: 0; }
      #edge-airtable-rulebook { animation-delay: 0.6s; opacity: 0; }

      #edge-rulebook-frontend { animation-delay: 0.9s; opacity: 0; }
      #node-frontend { animation-delay: 1.0s; opacity: 0; }
      #edge-rulebook-backend { animation-delay: 1.1s; opacity: 0; }
      #node-backend { animation-delay: 1.2s; opacity: 0; }
      #edge-rulebook-database { animation-delay: 1.3s; opacity: 0; }
      #node-database { animation-delay: 1.4s; opacity: 0; }
      #edge-rulebook-reports { animation-delay: 1.5s; opacity: 0; }
      #node-reports { animation-delay: 1.6s; opacity: 0; }

      #rule-box { animation-delay: 0.7s; opacity: 0; }
      #success-text { animation-delay: 2.0s; opacity: 0; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#0b0f14"/>

  <!-- Title -->
  <text id="title-text" class="node" x="400" y="30" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="bold" font-family="system-ui">
    ERB Architecture: 1 Rule, Generated Everywhere
  </text>

  <!-- Source: Airtable - Position wrapper outside, animation wrapper inside -->
  <g transform="translate(150, 100)">
    <g id="node-airtable" class="node">
      <rect x="-100" y="-30" width="200" height="60" rx="12" fill="rgba(14,22,33,0.95)" stroke="#f2cc60" stroke-width="2"/>
      <text text-anchor="middle" y="-5" fill="#f2cc60" font-size="12" font-family="system-ui">SINGLE SOURCE OF TRUTH</text>
      <text text-anchor="middle" y="15" fill="#e6edf3" font-size="14" font-family="system-ui">Airtable</text>
    </g>
  </g>

  <!-- The Rule (defined once) - Position wrapper outside, animation wrapper inside -->
  <g transform="translate(150, 200)">
    <g id="rule-box" class="node">
      <rect x="-90" y="-40" width="180" height="80" rx="8" fill="rgba(43,138,62,0.2)" stroke="#2b8a3e" stroke-width="2"/>
      <text text-anchor="middle" y="-15" fill="#2b8a3e" font-size="12" font-family="system-ui">IsVIP Rule (defined ONCE)</text>
      <text text-anchor="middle" y="8" fill="#e6edf3" font-size="13" font-family="monospace">TotalSales &gt; $100</text>
      <text text-anchor="middle" y="28" fill="#7ee787" font-size="11" font-family="system-ui">= TRUE</text>
    </g>
  </g>

  <!-- Hub: Rulebook - Position wrapper outside, animation wrapper inside -->
  <g transform="translate(400, 150)">
    <g id="node-rulebook" class="node">
      <rect x="-110" y="-35" width="220" height="70" rx="12" fill="rgba(14,22,33,0.95)" stroke="#58a6ff" stroke-width="2"/>
      <text text-anchor="middle" y="-8" fill="#58a6ff" font-size="12" font-family="system-ui">INTERMEDIATE REPRESENTATION</text>
      <text text-anchor="middle" y="15" fill="#e6edf3" font-size="14" font-family="system-ui">Effortless Rulebook</text>
    </g>
  </g>

  <!-- Edges from Airtable to Rulebook -->
  <path id="edge-airtable-rulebook" class="edge" d="M250,100 L290,150" fill="none" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Generated Outputs - Position wrapper outside, animation wrapper inside -->
  <g transform="translate(550, 260)">
    <g id="node-frontend" class="node">
      <rect x="-70" y="-25" width="140" height="50" rx="10" fill="rgba(14,22,33,0.95)" stroke="#2b8a3e" stroke-width="2"/>
      <text text-anchor="middle" y="-5" fill="#9aa7b2" font-size="10" font-family="system-ui">GENERATED</text>
      <text text-anchor="middle" y="12" fill="#e6edf3" font-size="12" font-family="system-ui">React (JS)</text>
    </g>
  </g>

  <g transform="translate(550, 320)">
    <g id="node-backend" class="node">
      <rect x="-70" y="-25" width="140" height="50" rx="10" fill="rgba(14,22,33,0.95)" stroke="#2b8a3e" stroke-width="2"/>
      <text text-anchor="middle" y="-5" fill="#9aa7b2" font-size="10" font-family="system-ui">GENERATED</text>
      <text text-anchor="middle" y="12" fill="#e6edf3" font-size="12" font-family="system-ui">Go API</text>
    </g>
  </g>

  <g transform="translate(700, 260)">
    <g id="node-database" class="node">
      <rect x="-70" y="-25" width="140" height="50" rx="10" fill="rgba(14,22,33,0.95)" stroke="#2b8a3e" stroke-width="2"/>
      <text text-anchor="middle" y="-5" fill="#9aa7b2" font-size="10" font-family="system-ui">GENERATED</text>
      <text text-anchor="middle" y="12" fill="#e6edf3" font-size="12" font-family="system-ui">PostgreSQL</text>
    </g>
  </g>

  <g transform="translate(700, 320)">
    <g id="node-reports" class="node">
      <rect x="-70" y="-25" width="140" height="50" rx="10" fill="rgba(14,22,33,0.95)" stroke="#2b8a3e" stroke-width="2"/>
      <text text-anchor="middle" y="-5" fill="#9aa7b2" font-size="10" font-family="system-ui">GENERATED</text>
      <text text-anchor="middle" y="12" fill="#e6edf3" font-size="12" font-family="system-ui">Excel</text>
    </g>
  </g>

  <!-- Edges from Rulebook to outputs -->
  <path id="edge-rulebook-frontend" class="edge" d="M510,150 Q530,200 550,235" fill="none" stroke="#2a3a4a" stroke-width="2" marker-end="url(#arrow)"/>
  <path id="edge-rulebook-backend" class="edge" d="M510,175 Q530,250 550,295" fill="none" stroke="#2a3a4a" stroke-width="2" marker-end="url(#arrow)"/>
  <path id="edge-rulebook-database" class="edge" d="M510,150 Q620,180 700,235" fill="none" stroke="#2a3a4a" stroke-width="2" marker-end="url(#arrow)"/>
  <path id="edge-rulebook-reports" class="edge" d="M510,175 Q620,250 700,295" fill="none" stroke="#2a3a4a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Animated flowing tokens -->
  <g filter="url(#glow)">
    <!-- Airtable to Rulebook -->
    <circle r="6" fill="#f2cc60">
      <animateMotion dur="1s" repeatCount="indefinite" begin="1s" path="M150,100 Q220,125 290,150"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="1s" repeatCount="indefinite" begin="1s"/>
    </circle>

    <!-- Rulebook to outputs -->
    <circle r="5" fill="#2b8a3e">
      <animateMotion dur="1.2s" repeatCount="indefinite" begin="2s" path="M400,150 Q475,200 550,260"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="1.2s" repeatCount="indefinite" begin="2s"/>
    </circle>
    <circle r="5" fill="#2b8a3e">
      <animateMotion dur="1.3s" repeatCount="indefinite" begin="2.3s" path="M400,150 Q475,240 550,320"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="1.3s" repeatCount="indefinite" begin="2.3s"/>
    </circle>
    <circle r="5" fill="#2b8a3e">
      <animateMotion dur="1.4s" repeatCount="indefinite" begin="2.6s" path="M400,150 Q550,200 700,260"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="1.4s" repeatCount="indefinite" begin="2.6s"/>
    </circle>
    <circle r="5" fill="#2b8a3e">
      <animateMotion dur="1.5s" repeatCount="indefinite" begin="2.9s" path="M400,150 Q550,250 700,320"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="1.5s" repeatCount="indefinite" begin="2.9s"/>
    </circle>
  </g>

  <!-- Success text -->
  <text id="success-text" class="node" x="400" y="385" text-anchor="middle" fill="#7ee787" font-size="14" font-family="system-ui">
    Change the rule once, regenerate all outputs automatically
  </text>
</svg>
