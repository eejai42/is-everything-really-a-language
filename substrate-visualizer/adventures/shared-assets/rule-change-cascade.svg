<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes strikethrough {
        from { width: 0; }
        to { width: 100%; }
      }
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-3px); }
        75% { transform: translateX(3px); }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }

      .system { animation: fadeIn 0.4s ease-out forwards; }
      .old-rule { animation: fadeIn 0.3s ease-out forwards; }
      .new-rule { animation: fadeIn 0.5s ease-out forwards; }
      .strike { animation: strikethrough 0.4s ease-out forwards; }
      .warning { animation: blink 1s ease-in-out infinite; }

      #sys-1 { animation-delay: 0.1s; opacity: 0; }
      #sys-2 { animation-delay: 0.2s; opacity: 0; }
      #sys-3 { animation-delay: 0.3s; opacity: 0; }
      #sys-4 { animation-delay: 0.4s; opacity: 0; }

      #old-1 { animation-delay: 0.6s; opacity: 0; }
      #old-2 { animation-delay: 0.7s; opacity: 0; }
      #old-3 { animation-delay: 0.8s; opacity: 0; }
      #old-4 { animation-delay: 0.9s; opacity: 0; }

      #strike-1 { animation-delay: 1.5s; }
      #strike-2 { animation-delay: 2.0s; }
      #strike-3 { animation-delay: 2.5s; }
      #strike-4 { animation-delay: 3.0s; }

      #new-1 { animation-delay: 1.8s; opacity: 0; }
      #new-2 { animation-delay: 2.3s; opacity: 0; }
      #new-3 { animation-delay: 2.8s; opacity: 0; }
      #new-4 { animation-delay: 3.3s; opacity: 0; }

      #time-1 { animation-delay: 1.9s; opacity: 0; }
      #time-2 { animation-delay: 2.4s; opacity: 0; }
      #time-3 { animation-delay: 2.9s; opacity: 0; }
      #time-4 { animation-delay: 3.4s; opacity: 0; }

      #title { animation-delay: 0s; opacity: 0; }
      #total-time { animation-delay: 3.8s; opacity: 0; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#0b0f14"/>

  <!-- Title -->
  <text id="title" class="system" x="400" y="35" text-anchor="middle" fill="#ff7b72" font-size="18" font-weight="bold" font-family="system-ui">
    Rule Change: $100 -> $500 (Manual Updates Required)
  </text>

  <!-- System 1: Frontend -->
  <g transform="translate(100, 130)">
    <g id="sys-1" class="system">
      <rect x="-80" y="-35" width="160" height="70" rx="10" fill="rgba(14,22,33,0.95)" stroke="#58a6ff" stroke-width="2"/>
      <text text-anchor="middle" y="-10" fill="#58a6ff" font-size="11" font-family="system-ui">FRONTEND</text>
      <text text-anchor="middle" y="10" fill="#e6edf3" font-size="13" font-family="system-ui">React App</text>
    </g>
    <g id="old-1" class="old-rule" transform="translate(0, 85)">
      <rect x="-70" y="-20" width="140" height="40" rx="6" fill="rgba(255,123,114,0.1)" stroke="#ff7b72" stroke-width="1"/>
      <text text-anchor="middle" y="5" fill="#9aa7b2" font-size="11" font-family="monospace">sales &gt; 100</text>
      <line id="strike-1" class="strike" x1="-60" y1="5" x2="60" y2="5" stroke="#ff7b72" stroke-width="2"/>
    </g>
    <g id="new-1" class="new-rule" transform="translate(0, 140)">
      <rect x="-70" y="-20" width="140" height="40" rx="6" fill="rgba(43,138,62,0.15)" stroke="#2b8a3e" stroke-width="2"/>
      <text text-anchor="middle" y="5" fill="#7ee787" font-size="11" font-family="monospace">sales &gt; 500</text>
    </g>
    <text id="time-1" class="new-rule" x="0" y="185" text-anchor="middle" fill="#f2cc60" font-size="10" font-family="system-ui">~45 min</text>
  </g>

  <!-- System 2: Backend -->
  <g transform="translate(300, 130)">
    <g id="sys-2" class="system">
      <rect x="-80" y="-35" width="160" height="70" rx="10" fill="rgba(14,22,33,0.95)" stroke="#2b8a3e" stroke-width="2"/>
      <text text-anchor="middle" y="-10" fill="#2b8a3e" font-size="11" font-family="system-ui">BACKEND</text>
      <text text-anchor="middle" y="10" fill="#e6edf3" font-size="13" font-family="system-ui">Go API</text>
    </g>
    <g id="old-2" class="old-rule" transform="translate(0, 85)">
      <rect x="-70" y="-20" width="140" height="40" rx="6" fill="rgba(255,123,114,0.1)" stroke="#ff7b72" stroke-width="1"/>
      <text text-anchor="middle" y="5" fill="#9aa7b2" font-size="11" font-family="monospace">sales &gt; 100</text>
      <line id="strike-2" class="strike" x1="-60" y1="5" x2="60" y2="5" stroke="#ff7b72" stroke-width="2"/>
    </g>
    <g id="new-2" class="new-rule" transform="translate(0, 140)">
      <rect x="-70" y="-20" width="140" height="40" rx="6" fill="rgba(43,138,62,0.15)" stroke="#2b8a3e" stroke-width="2"/>
      <text text-anchor="middle" y="5" fill="#7ee787" font-size="11" font-family="monospace">sales &gt; 500</text>
    </g>
    <text id="time-2" class="new-rule" x="0" y="185" text-anchor="middle" fill="#f2cc60" font-size="10" font-family="system-ui">~1 hour</text>
  </g>

  <!-- System 3: Database -->
  <g transform="translate(500, 130)">
    <g id="sys-3" class="system">
      <rect x="-80" y="-35" width="160" height="70" rx="10" fill="rgba(14,22,33,0.95)" stroke="#f2cc60" stroke-width="2"/>
      <text text-anchor="middle" y="-10" fill="#f2cc60" font-size="11" font-family="system-ui">DATABASE</text>
      <text text-anchor="middle" y="10" fill="#e6edf3" font-size="13" font-family="system-ui">PostgreSQL</text>
    </g>
    <g id="old-3" class="old-rule" transform="translate(0, 85)">
      <rect x="-70" y="-20" width="140" height="40" rx="6" fill="rgba(255,123,114,0.1)" stroke="#ff7b72" stroke-width="1"/>
      <text text-anchor="middle" y="5" fill="#9aa7b2" font-size="11" font-family="monospace">sales &gt; 100</text>
      <line id="strike-3" class="strike" x1="-60" y1="5" x2="60" y2="5" stroke="#ff7b72" stroke-width="2"/>
    </g>
    <g id="new-3" class="new-rule" transform="translate(0, 140)">
      <rect x="-70" y="-20" width="140" height="40" rx="6" fill="rgba(43,138,62,0.15)" stroke="#2b8a3e" stroke-width="2"/>
      <text text-anchor="middle" y="5" fill="#7ee787" font-size="11" font-family="monospace">sales &gt; 500</text>
    </g>
    <text id="time-3" class="new-rule" x="0" y="185" text-anchor="middle" fill="#f2cc60" font-size="10" font-family="system-ui">~1.5 hours</text>
  </g>

  <!-- System 4: Reports -->
  <g transform="translate(700, 130)">
    <g id="sys-4" class="system">
      <rect x="-80" y="-35" width="160" height="70" rx="10" fill="rgba(14,22,33,0.95)" stroke="#8957e5" stroke-width="2"/>
      <text text-anchor="middle" y="-10" fill="#8957e5" font-size="11" font-family="system-ui">REPORTS</text>
      <text text-anchor="middle" y="10" fill="#e6edf3" font-size="13" font-family="system-ui">Excel Macros</text>
    </g>
    <g id="old-4" class="old-rule" transform="translate(0, 85)">
      <rect x="-70" y="-20" width="140" height="40" rx="6" fill="rgba(255,123,114,0.1)" stroke="#ff7b72" stroke-width="1"/>
      <text text-anchor="middle" y="5" fill="#9aa7b2" font-size="11" font-family="monospace">B2 &gt; 100</text>
      <line id="strike-4" class="strike" x1="-60" y1="5" x2="60" y2="5" stroke="#ff7b72" stroke-width="2"/>
    </g>
    <g id="new-4" class="new-rule" transform="translate(0, 140)">
      <rect x="-70" y="-20" width="140" height="40" rx="6" fill="rgba(43,138,62,0.15)" stroke="#2b8a3e" stroke-width="2"/>
      <text text-anchor="middle" y="5" fill="#7ee787" font-size="11" font-family="monospace">B2 &gt; 500</text>
    </g>
    <text id="time-4" class="new-rule" x="0" y="185" text-anchor="middle" fill="#f2cc60" font-size="10" font-family="system-ui">~30 min</text>
  </g>

  <!-- Total time -->
  <g id="total-time" class="new-rule" transform="translate(400, 370)">
    <rect x="-180" y="-20" width="360" height="40" rx="8" fill="rgba(255,123,114,0.2)" stroke="#ff7b72" stroke-width="2"/>
    <text text-anchor="middle" y="7" fill="#ff7b72" font-size="16" font-weight="bold" font-family="system-ui">
      Total: ~4 hours of developer time
    </text>
  </g>
</svg>
